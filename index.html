      E:{h:"공부 자체가 재미있고 새로운 걸 알게 되는 게 좋은 마음이 강해요. 이런 마음이 있으면 어떤 공부도 즐겁게 할 수 있어요.",m:"재미있는 내용은 열심히 하는데, 재미없으면 하기 싫어지는 편이에요. 배운 내용이 실제 생활에서 어떻게 쓰이는지 찾아보면 더 재미있어질 수 있어요.",l:"지금은 공부 자체가 즐겁지 않은 것 같아요. 억지로 하는 공부는 오래 못 해요. 내가 좋아하는 것과 연결해서 공부할 수 있는 방법을 선생님과 함께 찾아봐요."},
      M:{h:"내재동기 고점. Ryan&Deci(2000) 자기결정이론에서 내재동기는 장기 학업 지속성의 가장 강력한 예측 변수입니다. 이 강점이 있는 한 번아웃 위험이 현저히 낮습니다.",m:"내재동기 중간 수준. 흥미로운 내용에선 잘 작동하지만 그렇지 않은 과목에선 외재동기에 의존합니다. 공부의 이유를 외부에서 내부로 조금씩 이동시키는 연습이 필요합니다.",l:"내재동기가 낮습니다. Ryan&Deci(2000) 연구에서 내재동기 저점은 학업 지속성 약화와 직결됩니다. 지금 공부를 '의무'로만 느끼고 있을 가능성이 높습니다. 관심 있는 분야와 학습 내용을 연결하는 시도가 필요합니다."},
      H:{h:`내재동기 고점(${pct}점). Ryan&Deci(2000) 자기결정이론 기준 상위 수준. 이 점수대 수험생은 성적 정체기에서도 동기 유지력이 높고 번아웃 위험이 낮습니다. 수험 장기전에서 가장 중요한 자원입니다.`,m:`내재동기 중간 수준(${pct}점). 입시 압박이 가중될수록 외재동기 의존이 높아질 위험이 있습니다. 지금 '왜 이 전공인가'를 구체적으로 연결하는 작업이 장기전 동기를 지탱합니다.`,l:`내재동기 저점(${pct}점). Ryan&Deci(2000) 기준 하위 수준. 현재 동기 구조가 외부 압박에 의존하고 있다면 성적 정체기나 실패 시 급격한 의욕 저하가 발생합니다. 관심 전공과 현재 학습의 연결고리를 만드는 것이 시급합니다.`}
    },
    extrinsic:{
      E:{
        h:"칭찬받거나 좋은 성적을 받고 싶은 마음이 공부의 큰 힘이 되고 있어요. 이런 마음은 자연스러운 거예요. 다만 '내가 재미있어서', '알고 싶어서' 공부하는 마음도 조금씩 키워가면 더 오래 잘할 수 있어요.",
        m:"성적이나 칭찬도 동기가 되면서, 내 안에서 나오는 이유도 함께 있는 균형 잡힌 상태예요. 이 균형이 공부를 꾸준히 할 수 있는 힘이 됩니다.",
        l:"칭찬이나 보상보다 스스로의 이유로 공부하는 편이에요. 이건 나쁜 것이 아니에요. '내가 왜 이걸 배우는지'가 내 안에 있다면 아주 좋은 상태입니다. 만약 아직 그 이유를 잘 모르겠다면, 선생님과 함께 찾아봐요."
      },
      M:{
        h:"성적·칭찬·보상이 공부의 주된 동기로 작동하고 있습니다. 이 자체는 문제가 아닙니다. 다만 보상이 없어지거나 성적이 기대에 못 미칠 때 동기가 흔들릴 수 있습니다. 내가 이 공부를 왜 하는지 내면의 이유를 함께 탐색하면 더 안정적인 동기 구조가 만들어집니다.",
        m:"외부 동기(성적·칭찬)와 내부 동기(흥미·성장)가 균형 있게 작동하고 있습니다. 두 가지가 함께 있을 때 공부 지속성이 가장 높습니다. 지금 이 균형을 유지하는 것이 중요합니다.",
        l:"타인의 기대나 성적보다 자신의 이유로 공부하는 경향이 있습니다. 이는 긍정적인 신호입니다. 내재동기가 높은 학생은 어려운 상황에서도 스스로 동기를 유지할 수 있습니다. 내재동기 점수와 함께 해석하면 더 정확합니다."
      },
      H:{
        h:`성적·입시·타인 기대가 공부의 핵심 동기로 작동하고 있습니다(${pct}점). 이 구조는 단기 성과에는 효과적이지만, 수험 후반부나 성적 하락 시 동기가 급격히 흔들릴 위험이 있습니다. '내가 이 공부를 왜 하는가'에 대한 자신만의 답을 지금부터 찾아두는 것이 중요합니다.`,
        m:`외재동기와 내재동기가 균형 있게 작동하고 있습니다(${pct}점). 성적 목표도 있으면서 스스로의 이유도 있는 상태입니다. 이 균형이 수험 장기전에서 심리적 내구력의 핵심입니다.`,
        l:`성적보다 자신의 이유로 공부하는 구조입니다(${pct}점). 이것은 좋은 신호입니다. 내재동기가 이를 뒷받침하고 있다면 수험 후반부까지 가장 안정적인 동기 구조를 유지할 수 있습니다. 내재동기 점수와 함께 확인하세요.`
      }
    },
    interest:{
      E:{h:"수업 시간이 재미있고 새로운 걸 배우는 게 좋은 마음이 강해요. 이런 친구들은 공부에 더 집중하고 많이 배우게 돼요.",m:"재미있는 내용엔 집중이 잘 되는데, 지루한 내용은 하기 싫어져요. 배운 내용이 실제 어디에 쓰이는지 생각해보면 더 흥미로워질 수 있어요.",l:"지금 공부가 많이 지루하고 재미없게 느껴지는 것 같아요. 억지로 흥미를 만들 순 없지만, 내가 좋아하는 것과 연결된 부분부터 찾아보면 조금씩 달라질 수 있어요."},
      M:{h:"학습흥미 고점. 수업 참여도와 자기주도학습 시작점이 모두 양호합니다. 이 흥미를 유지하면서 전략적 깊이를 더하는 것이 다음 과제입니다.",m:"학습흥미 중간. 흥미로운 내용에선 잘 작동하지만 그렇지 않은 단원에서 집중력이 떨어집니다. 모든 단원을 흥미롭게 만들 순 없지만, 의미를 연결하는 작업이 도움이 됩니다.",l:"학습흥미가 낮습니다. 흥미 없이 학습량만 늘리면 집중력이 함께 떨어집니다. 억지로 흥미를 만들기보다 실생활 연결, 목표 연결 방식으로 접근하세요."},
      H:{h:`학습흥미 고점(${pct}점). 수험 환경에서 이 수준의 흥미를 유지하는 것은 쉽지 않습니다. 이 강점이 학습 지속성과 집중력을 뒷받침하고 있습니다.`,m:`학습흥미 중간(${pct}점). 과목별 편차가 클 가능성이 있습니다. 흥미 낮은 과목에서의 전략적 접근(의미 연결, 단기 목표 설정)이 필요합니다.`,l:`학습흥미 저점(${pct}점). 수험 환경에서 흥미 소진은 빠르게 번아웃으로 이어집니다. 지금 흥미 회복보다 목표 명료화가 더 현실적인 처방입니다. 내가 왜 이 대학·학과를 가고 싶은지를 구체화하면 흥미 없어도 움직이는 이유가 생깁니다.`}
    },
    concentration:{
      E:{h:"공부할 때 집중력이 좋아요. 딴생각이 와도 금방 다시 집중할 수 있는 힘이 있어요. 이게 공부를 잘 하게 해주는 중요한 힘이에요.",m:"어떤 때는 집중이 잘 되는데, 어떤 때는 딴생각이 많이 나요. 공부할 때 스마트폰을 멀리 두고, 25분 공부 5분 쉬기 방법을 해보세요.",l:"집중하기가 많이 어려운 상태예요. 연구에 따르면 집중력은 훈련으로 키울 수 있어요. 지금은 10분이라도 딴짓 없이 공부하는 연습부터 시작해봐요."},
      M:{h:"주의집중 고점. 학업성취도의 15%를 설명하는 핵심 변수(Hattie, 2009)에서 우수한 수준입니다. 집중의 양과 질이 모두 확보되어 있습니다.",m:"주의집중 중간. 책상에 앉아있는 시간 대비 실제 집중 시간이 약 60~70% 수준일 가능성이 있습니다. 포모도로(25분 집중 5분 휴식) 기법 적용을 권장합니다.",l:"주의집중 저점. 솔직히 말하면, 지금 공부 시간보다 집중의 질이 심각하게 낮습니다. Hattie(2009) 메타분석에서 집중력 개선은 성취도 향상에 직접 기여합니다. 환경 통제(핸드폰 분리, 고정된 공부 공간)부터 시작하세요."},
      H:{h:`주의집중 고점(${pct}점). Hattie(2009) 기준 상위 수준. 고강도 집중 진입 속도가 빠르고 유지력이 강합니다. 이 역량이 같은 시간 대비 학습 성과를 높이는 핵심 변수입니다.`,m:`주의집중 중간(${pct}점). 디지털 자극에 의한 집중 단절이 빈번할 가능성이 있습니다. 실제 집중 시간을 측정해보세요. 체감과 실제의 차이가 클 수 있습니다.`,l:`주의집중 저점(${pct}점). 지금 하루 몇 시간 공부하는지보다, 실제 고집중 상태의 시간이 얼마인지가 중요합니다. 이 수치가 낮으면 아무리 많은 시간을 투자해도 성과가 나지 않습니다. 물리적 환경 통제가 최우선입니다.`}
    },
    self_directed:{
      E:{h:"스스로 공부를 계획하고 실천하는 힘이 강해요. 선생님이나 부모님이 없어도 혼자 공부할 수 있는 훌륭한 능력이에요!",m:"누군가 도와주면 공부를 잘 하는데, 혼자 하기엔 좀 어려울 때가 있어요. 하루에 딱 하나만 스스로 결정해서 해보는 연습을 해봐요.",l:"아직 공부의 주인이 나 자신이 아닌 것 같아요. 학원이나 부모님이 시키는 것만 하는 습관이 굳어지면 나중에 혼자 공부하기가 더 어려워져요. 지금부터 조금씩 스스로 해보는 연습이 필요해요."},
      M:{h:"자기주도성 고점. Zimmerman(2000) 자기조절학습 모델에서 목표설정·전략선택·자기점검을 스스로 하는 수준입니다. 고등학교 진학 후에도 이 역량이 성적의 기반이 됩니다.",m:"자기주도성 중간. 누군가 설계해준 계획은 잘 따르지만 스스로 설계하는 것엔 어려움이 있습니다. Zimmerman(2000) 모델에서 자기주도성은 훈련 가능한 역량입니다. 매일 공부 전 3분 계획 세우기부터 시작하세요.",l:"자기주도성 저점. 솔직히 말합니다. 지금 공부의 주도권이 학원과 부모님에게 있습니다. 이 상태로 고등학교에 가면 자기 스스로 계획 세우는 것 자체가 안 됩니다. 지금 당장 하루 20분이라도 '아무도 시키지 않은 공부'를 하는 습관을 만들어야 합니다."},
      H:{h:`자기주도성 고점(${pct}점). Zimmerman(2000) 자기조절학습 모델 기준 상위 수준. 입시 전략의 주도권이 본인에게 있고 외부 의존도가 낮습니다. 수능 당일 이 역량이 결정적으로 작동합니다.`,m:`자기주도성 중간(${pct}점). 학원 커리큘럼과 별개의 자신만의 루틴이 있는지 점검하세요. 없다면 지금 당장 만들어야 합니다. 수능은 혼자 보는 시험입니다.`,l:`자기주도성 저점(${pct}점). 냉정하게 말합니다. 수능 당일 학원 선생님은 옆에 없습니다. 지금 이 상태를 유지한다면 구조적으로 불리합니다. 즉시 학원 외 자기주도 학습 시간(최소 2시간/일)을 확보하고 직접 계획을 세워야 합니다.`}
    },
    cognitive:{
      E:{h:"공부한 내용을 오래 기억하는 방법을 잘 알고 있어요. 단순히 읽기만 하는 게 아니라 정리하고 연결해서 공부하는 훌륭한 습관이 있어요.",m:"중요한 내용은 표시하는 편이지만, 더 깊이 정리하거나 연결하는 부분이 아직 약해요. 배운 내용을 내 말로 다시 설명해보는 연습이 큰 도움이 돼요.",l:"지금 공부 방법이 단순히 읽거나 외우는 것에 머물러 있을 가능성이 높아요. Weinstein&Mayer(1986) 연구에 따르면 정교화·조직화 전략을 쓰는 학생이 단순 반복 학생보다 장기 기억이 훨씬 강해요."},
      M:{h:"인지전략 고점. Weinstein&Mayer(1986) 분류에서 정교화·조직화 전략을 활용하는 수준입니다. 같은 시간 공부해도 성과가 더 높은 이유가 여기에 있습니다.",m:"인지전략 중간. 기본 전략(표시, 요약)은 있지만 정교화(연결, 비교) 전략이 부족합니다. 새 내용을 배울 때 '이것이 기존에 아는 무엇과 같은가?'라는 질문을 습관화하세요.",l:"인지전략 저점. 지금 공부 방법이 반복 읽기·기계적 암기에 머물러 있습니다. Weinstein&Mayer(1986) 연구에서 이 방법은 단기 기억엔 효과적이지만 시험 적용력이 크게 떨어집니다. 공부 방법 자체를 바꿔야 합니다."},
      H:{h:`인지전략 고점(${pct}점). Weinstein&Mayer(1986) 인지전략 분류에서 정교화·조직화 수준. 개념 간 연결과 구조화 학습이 수능 문제 풀이력과 직결되고 있습니다.`,m:`인지전략 중간(${pct}점). 암기 의존도를 점검하세요. 수능은 암기가 아닌 이해와 적용을 요구합니다. 학습 후 '이 개념을 처음 보는 사람에게 설명한다면?'이라는 질문으로 복습하세요.`,l:`인지전략 저점(${pct}점). 현재 공부 시간 대비 성과가 낮은 이유가 여기에 있습니다. 수능 고득점은 암기량이 아닌 개념 적용력에서 갈립니다. 지금 당장 공부 방식을 '읽기·암기'에서 '설명·적용'으로 전환해야 합니다.`}
    },
    metacognition:{
      E:{h:"내가 아는 것과 모르는 것을 스스로 잘 파악해요. 이 능력이 있으면 어디를 더 공부해야 하는지 스스로 알 수 있어서 공부 시간을 아낄 수 있어요.",m:"어떤 때는 내가 이해했다고 생각했는데 시험에서 생각이 안 날 때가 있어요. 공부한 다음에 책을 덮고 방금 배운 내용을 혼자 떠올려보는 연습이 도움이 돼요.",l:"지금 '열심히 했는데 왜 시험에서 틀리지?'라는 경험이 있을 수 있어요. Flavell(1979) 연구에서 이건 메타인지가 약할 때 나타나는 현상이에요. 공부한 뒤 반드시 책을 닫고 혼자 떠올려보는 연습을 해봐요."},
      M:{h:"메타인지 고점. Flavell(1979) 이론에서 자신의 인지 상태를 정확히 모니터링하는 수준입니다. 1등급 학생들의 공통 특징 중 하나입니다. 이 능력이 학습 효율을 극대화합니다.",m:"메타인지 중간. '공부한 것 같은데 시험에서 안 나온다'는 경험이 있을 수 있습니다. Flavell(1979) 모델에서 이는 표면적 이해와 실제 이해의 혼동에서 비롯됩니다. 백지 테스트(배운 것 혼자 쓰기)를 매일 3분씩 하세요.",l:"메타인지 저점. 공부량 문제가 아닐 수 있습니다. Flavell(1979) 연구에서 메타인지 저점은 학습-시험 성과 불일치의 핵심 원인입니다. 지금 당장 백지 테스트를 도입하세요. 공부 후 책 덮고 아는 것 모두 적기. 이것만으로도 메타인지가 빠르게 향상됩니다."},
      H:{h:`메타인지 고점(${pct}점). Flavell(1979)·Dunning&Kruger(1999) 연구 기준 상위 수준. 자신이 아는 것과 모르는 것의 경계를 정확히 인식합니다. 이 능력이 수능 고득점 학생들의 가장 일관된 특징입니다.`,m:`메타인지 중간(${pct}점). '이해한 것 같은데 실제 문제에서 막히는' 패턴이 있다면 이것이 원인입니다. 오답 분석 시 '왜 틀렸는가'를 실수·개념·논리 오류로 분류하는 습관을 만드세요.`,l:`메타인지 저점(${pct}점). 가장 즉각적인 개선이 필요한 영역입니다. 지금 공부량보다 이것이 먼저입니다. 학습 후 백지 테스트, 오답 원인 3분류(실수/개념/논리) 분석을 즉시 도입하세요. Dunning&Kruger(1999) 연구에서 메타인지 저점은 자신의 실제 이해 수준을 과대평가하는 경향과 연결됩니다.`}
    },
    test_anxiety:{
      E:{h:"시험 때 긴장을 잘 조절하는 편이에요. 알고 있는 것을 시험에서 잘 발휘할 수 있는 좋은 상태예요.",m:"시험 전에 좀 떨리고 긴장되는 건 정상이에요. 하지만 너무 심해지면 힘들 수 있어요. 시험 전에 크게 숨을 들이쉬고 내쉬는 연습을 해보세요.",l:"시험이 너무 무섭고 불안한 마음이 강한 것 같아요. Spielberger(1980) 연구에서 이런 불안이 너무 크면 알고 있는 것도 시험에서 못 보여줄 수 있어요. 선생님이나 부모님에게 이 마음을 솔직하게 말하는 게 중요해요."},
      M:{h:"시험불안 낮은 수준. 시험 상황에서 평정심을 유지하고 실력을 안정적으로 발휘할 수 있는 상태입니다. Spielberger(1980) 기준 하위 수준으로, 수행 불안의 간섭이 적습니다.",m:"시험불안 중간. 적절한 긴장감은 수행을 향상시킵니다(Yerkes-Dodson, 1908). 그러나 이 수준이 더 높아지면 실력 발휘를 방해합니다. 시험 전 루틴(정해진 준비 패턴)을 만드는 것이 효과적입니다.",l:"시험불안 고점. Spielberger(1980) 기준 상위 수준. 이 수준에서는 실제 실력보다 낮은 점수가 나올 가능성이 큽니다. 솔직히 말하면, 지금 공부보다 불안 관리 훈련이 더 시급합니다. 호흡 조절, 시험 전 고정 루틴 구축이 가장 효과적인 처방입니다."},
      H:{h:`시험불안 낮은 수준(${pct}점). Spielberger(1980) 기준 하위 수준. 수능·내신 모두에서 실력을 안정적으로 발휘할 수 있는 심리적 조건이 갖춰져 있습니다.`,m:`시험불안 중간(${pct}점). Yerkes-Dodson(1908) 역U자형 곡선에서 아직 최적 수행 구간에 있습니다. 그러나 수능이 가까워질수록 상승할 가능성이 있어 사전 관리가 필요합니다.`,l:`시험불안 고점(${pct}점). Spielberger(1980) 기준 상위 수준. 현재 실력보다 낮은 점수가 나오고 있을 가능성이 높습니다. 이것은 의지의 문제가 아닙니다. 인지행동치료(CBT) 기반 불안 관리 기법, 시험 전 고정 루틴 구축이 필요합니다. 학습량 증가는 이 시점에서 역효과입니다.`}
    },
    fear_failure:{
      E:{h:"실패해도 다시 도전하는 용기가 있어요. 틀리는 것을 두려워하지 않는 이 마음이 나중에 아주 큰 힘이 될 거예요.",m:"틀리는 게 좀 무섭고 창피할 때가 있어요. 하지만 틀리지 않으면 성장도 없어요. '틀려도 괜찮아, 다음에 잘하면 돼'라고 스스로에게 말해보세요.",l:"실수하거나 틀리는 것이 너무 무섭게 느껴지는 것 같아요. 이 두려움이 크면 어려운 문제에 아예 도전하지 않게 돼요. 실패는 나쁜 것이 아니에요. 실패를 통해 배우는 것이 진짜 공부예요."},
      M:{h:"실패공포 낮은 수준. Elliot&Church(1997) 성취목표이론에서 도전 회피가 낮고 숙달 접근 목표가 우세한 상태입니다. 어려운 문제에도 도전하는 태도가 장기 성장의 기반입니다.",m:"실패공포 중간. 도전과 회피 사이에서 갈등하는 수준입니다. '틀리면 어떡하지'보다 '이 문제를 통해 무엇을 배울 수 있지'로 관점을 전환하는 연습이 필요합니다.",l:"실패공포 고점. Elliot&Church(1997) 연구에서 이 수준은 어려운 문제 회피, 안전한 선택 반복과 강하게 연결됩니다. 솔직히 말하면, 지금 공부에서 진짜 어려운 문제를 피하고 있을 가능성이 높습니다. 이것이 성적의 천장을 만듭니다."},
      H:{h:`실패공포 낮은 수준(${pct}점). Elliot&Church(1997) 기준 하위 수준. 어려운 문제와 불확실한 상황에서도 도전 의지가 유지됩니다. 수능 고난이도 문항 접근에서 이 태도가 결정적입니다.`,m:`실패공포 중간(${pct}점). 전략적 스킵(시간 배분)과 두려움에 의한 회피를 구분해야 합니다. 지금 어려운 문제를 건너뛸 때 어떤 이유인지 스스로 점검하세요.`,l:`실패공포 고점(${pct}점). Elliot&Church(1997) 기준 상위 수준. 수능 고난이도 문항에서 두려움 때문에 시도조차 하지 않는 패턴이 있을 수 있습니다. 이것이 고득점의 구조적 장벽입니다. 오답을 '데이터'로 재프레이밍하는 사고 전환이 필요합니다.`}
    },
    positive_emotion:{
      E:{h:"공부할 때 즐겁고 뿌듯한 마음이 충분해요. 이런 마음이 있으면 힘들어도 포기하지 않고 계속 공부할 수 있어요.",m:"가끔 공부가 즐겁고 가끔은 힘들고 지칠 때가 있어요. 작은 목표를 정하고 달성했을 때 스스로 칭찬해주는 습관을 만들어봐요.",l:"지금 공부가 너무 힘들고 지쳐있는 것 같아요. 이럴 때 억지로 더 많이 공부하면 오히려 역효과가 날 수 있어요. 지금 당장 부모님이나 선생님께 솔직하게 힘들다고 말하는 게 필요해요."},
      M:{h:"긍정정서 고점. Fredrickson(2001) 긍정정서 확장-구축 이론에서 이 수준은 학습 지속성과 회복 탄력성을 강화합니다. 번아웃 위험이 낮고 어려운 시기에도 동기를 유지할 수 있는 상태입니다.",m:"긍정정서 중간. 공부에서 즐거움을 느끼는 순간이 있지만 전반적으로 부정적 감정도 공존합니다. 작은 성취를 명시적으로 기록하고 인식하는 습관이 긍정정서를 강화합니다.",l:"긍정정서 저점. 솔직히 말합니다. 지금 공부에 대한 감정이 많이 고갈된 상태입니다. Maslach(2003) 소진 모델 기준 위험 수준입니다. 지금 당장 학습량을 줄이고 심리적 회복이 먼저입니다. 이 상태에서 공부량을 늘리면 역효과가 납니다."},
      H:{h:`긍정정서 고점(${pct}점). Fredrickson(2001) 긍정정서 확장-구축 이론 기준 상위 수준. 수험 장기전에서 번아웃 위험이 낮고 성과 유지력이 강합니다. 이 상태를 유지하는 것 자체가 전략입니다.`,m:`긍정정서 중간(${pct}점). 수능이 가까워질수록 하락할 가능성이 있습니다. 지금부터 심리적 여유를 확보하는 루틴(충분한 수면, 주 1회 완전 휴식)을 전략적으로 설계하세요.`,l:`긍정정서 저점(${pct}점). 위험 신호입니다. Maslach(2003) 소진 모델 기준 고위험 수준입니다. 지금 학습량을 늘리는 것은 번아웃을 가속화합니다. 수면 회복, 물리적 활동, 심리적 지지 확보가 공부보다 먼저입니다. 이것이 성적 회복의 역설적 지름길입니다.`}
    },
    parent_relation:{
      E:{h:"부모님과 사이가 좋고 공부에 대해 편하게 이야기할 수 있어요. 이런 관계가 공부하는 데 큰 힘이 돼요.",m:"부모님과 대체로 잘 지내지만 공부나 성적 때문에 가끔 불편할 때가 있어요. 성적 이야기 말고 오늘 어떤 것을 배웠는지 이야기해보는 건 어떨까요?",l:"지금 부모님의 기대나 압박 때문에 공부가 더 힘들게 느껴지는 것 같아요. Ginsburg(2011) 연구에서 부모의 과도한 압박은 아이의 시험불안과 실패공포를 직접 높입니다. 부모님께 솔직하게 힘들다고 말하는 것이 필요합니다."},
      M:{h:"부모관계 양호. 가정 내 심리적 지지 기반이 탄탄합니다. Ginsburg(2011) 연구에서 부모의 정서적 지지는 자기효능감·내재동기와 직접 연결됩니다. 이 환경이 학습의 안전망 역할을 하고 있습니다.",m:"부모관계 중간. 학업 관련 소통에서 약간의 긴장이 있을 수 있습니다. 결과(성적) 중심 대화를 과정(노력·방법) 중심으로 전환하는 것이 관계와 학업 모두에 도움이 됩니다.",l:"부모관계 저점. Ginsburg(2011) 연구에서 부모 압박과 학생의 시험불안·실패공포는 강하게 연결됩니다. 솔직히 말하면, 지금 가정 환경이 학습 심리에 부정적 영향을 주고 있을 가능성이 높습니다. 학부모 상담이 병행되어야 학생 개입의 효과가 납니다."},
      H:{h:`부모관계 양호(${pct}점). 수험생에게 가정은 심리적 회복 공간입니다. Ginsburg(2011) 연구에서 부모의 지지적 태도는 수험생의 시험불안 완화와 직접 연결됩니다.`,m:`부모관계 중간(${pct}점). 입시 결과에 대한 부모의 기대가 심리적 압박으로 작용하는지 점검이 필요합니다. 현재 상태에서 부모-자녀 소통 방식을 조정하는 것이 남은 수험 기간에 도움이 됩니다.`,l:`부모관계 저점(${pct}점). 입시 갈등이 심리적 소진에 직접 기여하고 있을 가능성이 높습니다. 학습 전략 개선보다 가정 환경 조정이 먼저입니다. 학부모 상담을 통해 기대 조정과 정서적 지지 방식 전환이 필요합니다.`}
    },
    teacher_relation:{
      E:{h:"선생님과 사이가 좋고 모르는 것을 편하게 물어볼 수 있어요. 연구에 따르면 선생님과 관계가 좋으면 그 과목을 더 좋아하게 된대요.",m:"대체로 선생님과 잘 지내지만 가끔 질문하기 어려울 때가 있어요. 질문하는 것이 선생님을 귀찮게 하는 게 아니라 오히려 기쁘게 하는 일이에요.",l:"선생님이 무섭거나 질문하기 어려운 상황이 있는 것 같아요. 이러면 모르는 내용이 쌓여서 공부가 점점 어려워져요. 가장 편한 선생님부터 조금씩 질문하는 연습을 해봐요."},
      M:{h:"교사관계 양호. Roorda et al.(2011) 메타분석에서 긍정적 교사관계는 학습 동기 및 성취와 유의미한 상관관계를 보입니다. 질문과 피드백 수용이 원활한 환경입니다.",m:"교사관계 중간. 일부 선생님과는 편하지만 그렇지 않은 경우도 있습니다. 가장 편한 선생님부터 질문 습관을 만들고 점차 확장해나가세요.",l:"교사관계 저점. Roorda et al.(2011) 연구에서 부정적 교사관계는 해당 과목 회피로 이어집니다. 선생님이 불편해서 질문을 못 하고 있다면 모르는 내용이 누적됩니다. 학원 선생님이나 가장 편한 교사를 먼저 활용하세요."},
      H:{h:`교사관계 양호(${pct}점). Roorda et al.(2011) 연구 기준 양호 수준. 특히 약점 과목에서 교사 피드백을 적극 활용할 수 있는 환경이 확보되어 있습니다.`,m:`교사관계 중간(${pct}점). 특정 강사나 선생님과의 관계가 해당 과목 성취에 영향을 주고 있는지 점검하세요. 맞지 않는 강사 교체도 전략적 선택입니다.`,l:`교사관계 저점(${pct}점). 질문을 못 하는 환경이라면 독학 또는 온라인 자료를 적극 활용해야 합니다. Roorda et al.(2011) 연구에서 교사관계가 낮아도 자기주도성이 높으면 성취가 보완될 수 있습니다.`}
    },
    institute_dep:{
      E:{h:"학원에 너무 의존하지 않고 스스로 공부하는 힘이 있어요. 이 힘이 나중에 더 중요해져요.",m:"학원의 도움을 받으면서도 스스로 하는 공부도 어느 정도 있는 균형 잡힌 상태예요.",l:"지금 공부의 주인이 나보다 학원이나 부모님에게 있는 것 같아요. 학원을 다니는 것은 좋지만, 스스로 하는 공부 시간도 조금씩 늘려야 진짜 실력이 생겨요."},
      M:{h:"학습자율성 높은 수준. 학원 외의 자기주도 학습이 병행되고 있습니다. 이것이 고등학교 진학 후 성적 유지의 핵심 역량이 됩니다.",m:"학습자율성 보통 수준. 학원의 도움을 받으면서 일부 자기주도 학습도 있는 상태입니다. 학원 외 스스로 선택하는 공부 시간을 늘려가는 것이 중요합니다.",l:"학습자율성 저점. 솔직히 말합니다. 지금 성적이 학원 덕분에 유지되고 있을 가능성이 높습니다. 고등학교에 가면 학원만으로는 한계가 옵니다. 지금 당장 하루 30분이라도 학원 없이 스스로 계획하는 공부를 시작해야 합니다."},
      H:{h:`학습자율성 높은 수준(${pct}점). 수능을 혼자 보는 시험으로 봤을 때, 이것이 구조적으로 가장 유리한 상태입니다. 자신의 루틴과 전략으로 움직이고 있습니다.`,m:`학습자율성 보통 수준(${pct}점). 학원 커리큘럼 외에 자신만의 보완 루틴이 있는지 점검하세요. 없다면 지금 만들어야 합니다.`,l:`학습자율성 저점(${pct}점). 냉정하게 말합니다. 수능 당일 학원은 없습니다. 지금 학원 없이 3일을 혼자 공부한다면 어떻게 될지 상상해보세요. 그 답이 현재 이 점수의 의미입니다. 학원 외 자기주도 학습 시간(최소 2시간/일) 확보가 즉각 필요합니다.`}
    }
  };
  const key2=h?"h":l?"l":"m";
  return C[key]?.[level]?.[key2]||`${pct}점 수준의 ${key} 상태입니다.`;
}

/* 전략 조언 생성 */
function getStrategies(scores,level,overallAvg){
  const g=k=>scores.find(s=>s.key===k)?.pct||0;
  const se=g("self_efficacy"),ta=g("test_anxiety"),mc=g("metacognition"),
        sd=g("self_directed"),id=g("institute_dep"),pe=g("positive_emotion"),
        ff=g("fear_failure"),cg=g("cognitive"),pr=g("parent_relation"),
        intr=g("intrinsic");
  const strats=[];

  /* ① 심리적 응급 */
  if(pe<40){
    strats.push({priority:"1순위 · 즉시 개입",color:"var(--red)",
      title:"심리 회복이 공부보다 먼저입니다",
      content:level==="E"
        ?"지금 공부가 너무 힘들고 싫은 마음이 강해요. 억지로 더 많이 공부하면 오히려 더 힘들어져요. 부모님이나 선생님에게 지금 마음을 솔직하게 말해보세요. 먼저 조금 쉬는 것도 괜찮아요."
        :level==="M"?"긍정정서가 임계점 이하입니다. 지금 이 상태에서 공부량을 늘리는 것은 역효과입니다. 소진 위험 수준으로, 지금 당장 ①수면 8시간 확보 ②좋아하는 활동 30분/일 ③공부 이외 대화 시간 확보가 필요합니다. 학원 시간표 조정도 고려해야 합니다."
        :"긍정정서 임계점 이하. 번아웃 위험 수준입니다. 지금 공부 시간을 줄이고 ①수면 7시간 이상 확보 ②격일 유산소 운동 20분 ③신뢰하는 사람과 정서적 대화를 즉시 시작하세요. 지친 상태 10시간보다 회복된 상태 4시간의 집중이 수능 준비에 더 효과적입니다."});
  }

  if(ta>65&&se<45){
    strats.push({priority:"1순위 · 즉시 개입",color:"var(--red)",
      title:"불안-효능감 역전 패턴 — 즉각 처방 필요",
      content:level==="E"
        ?"시험이 너무 무섭고 '나는 못 할 것 같다'는 생각이 함께 있어요. 이럴 때는 아주 쉬운 문제 하나를 풀고 '나 해냈어!'라는 기분을 느끼는 것이 가장 중요해요. 작은 성공이 큰 자신감으로 연결돼요."
        :level==="M"?"시험불안 고점 + 자기효능감 저점 — 가장 위험한 조합입니다. 즉각 처방 3단계: ①시험 전날 '잘 풀었던 문제' 목록 3개 적기 ②시험 시작 전 4-7-8 호흡법(4초 들이쉬고, 7초 참고, 8초 내쉬기) ③처음 5분은 아는 문제만 먼저 풀어 심리적 안정 확보. 이것을 다음 시험부터 반드시 실행하세요."
        :"시험불안 고점·자기효능감 저점 동시 발생. 지금 모의고사에서 실력의 60~70%만 발휘되고 있을 가능성이 높습니다. 즉각 조치: ①매주 실제 시험 환경(시간 제한, 별도 공간)에서 기출 1회 완전 풀이 ②오답 분석 전 '이 문제 어디서 막혔나' 먼저 기록 ③시험 당일 루틴(아침 식사, 입장 시간, 도구 점검) 고정화. 루틴이 불안을 대체합니다."});
  }

  /* ② 전략 부재 */
  if(mc<50&&cg<50){
    strats.push({priority:"핵심 과제 · 공부 방법 전면 재설계",color:"var(--blue)",
      title:"공부 시간보다 공부 방법이 문제입니다",
      content:level==="E"
        ?"열심히 하는데 성적이 생각보다 안 오른다면, 공부 방법이 맞지 않을 수 있어요. 오늘부터 이것만 해봐요: 공부 후 책을 덮고 방금 배운 내용을 혼자 말해보세요. 떠오르지 않는 부분이 바로 '진짜 모르는 부분'이에요. 그 부분만 다시 봐요."
        :level==="M"?"메타인지·인지전략 동시 저점. 지금 공부 시간보다 방법이 문제입니다. 즉각 적용 3가지: ①공부 후 백지 테스트(책 덮고 아는 것 쓰기, 10분) ②새 내용을 배울 때 '이게 이전에 배운 ○○과 어떻게 연결되지?' 질문하기 ③오답을 '실수 / 개념 몰라서 / 문제 잘못 읽어서'로 분류하기. 이 세 가지를 2주만 실행해도 성적이 눈에 띄게 변합니다."
        :"메타인지·인지전략 동시 저점. 아무리 오래 공부해도 성과가 나지 않는 구조입니다. 4주 집중 처방: ①매일 학습 전 '오늘 뭘 모르는지' 먼저 파악(10분) ②학습 중 셀프 설명법('나는 지금 왜 이게 성립하는지 설명할 수 있는가?') ③학습 후 백지 테스트 ④오답을 개념오류/풀이오류/계산오류/시간부족 4가지로 분류해 약점 유형 파악. 시험 2주 전부터는 이 오답 유형 집중 복습만 해도 됩니다."});
  }

  /* ③ 자기주도 부재 */
  if(sd<45&&id>60){
    strats.push({priority:"구조 전환 필요",color:"var(--gray-500)",
      title:level==="H"?"수능은 혼자 보는 시험입니다":"공부의 주인이 되어야 할 때입니다",
      content:level==="E"
        ?"학원에서 시키는 것만 하는 습관이 굳어지면 나중에 혼자 공부해야 할 때 어떻게 해야 할지 모르게 돼요. 지금부터 하루 10분이라도 '내가 스스로 선택하는 공부 시간'을 만들어봐요. 오늘 공부할 문제 3개를 내가 직접 골라보는 것부터 시작해요."
        :level==="M"?"자기주도성 없는 학원의존은 고등학교 입학 후 급격한 성적 하락을 만드는 가장 강한 요인 중 하나입니다. 지금 당장 해야 할 일: ①학원 숙제 외에 스스로 선택하는 공부 30분 확보 ②일주일 계획을 내 손으로 작성 ③학원에 가기 전 '오늘 내가 이 시간에서 무엇을 얻을 것인가' 목표 1개 정하기."
        :"수능 당일 학원 선생님은 없습니다. 현재 자기주도성 저점·학원의존도 고점 조합에서는 수능이 구조적으로 불리합니다. 즉각 전환 계획: ①매일 자기주도 학습 2시간 확보(학원 숙제 별도) ②주간 계획표를 직접 작성하되 '무엇을, 얼마나, 어떤 방법으로' 구체 명시 ③약점 과목 1개는 학원 없이 혼자 문제집 1권 완주. 이 경험이 수능 직전 심리적 자립의 기반이 됩니다."});
  }

  /* ④ 내재동기 부재 (외재동기 의존) */
  if(intr<45&&overallAvg<65){
    strats.push({priority:"동기 재정립 필요",color:"var(--amber)",
      title:"'왜 공부하는가'를 다시 정의해야 할 시점입니다",
      content:level==="E"
        ?"'공부를 왜 하는지' 모르겠다는 생각이 드나요? 지금 좋아하는 것, 잘하는 것을 찾아보는 것이 먼저예요. 좋아하는 것과 공부가 연결되는 순간 공부가 달라져요."
        :level==="M"?"칭찬이나 성적표를 위한 공부는 동기가 흔들리면 바로 무너집니다. 지금 필요한 것: ①내가 잘하는 것 3가지 적기 ②그것이 미래에 어떻게 쓰일지 연결하기 ③공부에서 내가 직접 흥미를 느끼는 순간 1개 찾기. 이 3가지가 스스로 하는 공부의 씨앗이 됩니다."
        :"내재동기 저점에서의 수험 준비는 심리적 소진 위험이 높습니다. 목표 대학·학과를 구체화하고 '내가 그 곳에서 무엇을 할 것인가'를 명확히 하는 것이 내재동기를 외재동기로 전환하는 가장 실질적인 방법입니다. 학원에서 진로 연결 상담을 받아보는 것을 강력히 권합니다."});
  }

  /* ⑤ 부모 환경 */
  if(pr<40){
    strats.push({priority:"환경 조정 필요",color:"var(--purple-light)",
      title:"가정 환경 조정이 학습 개입보다 먼저입니다",
      content:level==="E"
        ?"부모님과의 관계에서 공부 때문에 힘든 마음이 있는 것 같아요. 부모님께 '이렇게 하면 더 힘들어요'라고 솔직하게 말해보세요. 부모님도 여러분이 잘 되기를 바라고 있어요. 선생님이 도와줄 수도 있어요."
        :level==="M"?"부모 관계 압박이 시험불안과 실패공포를 직접 높이고 있을 가능성이 있습니다. 학생 개입만으로는 효과가 제한됩니다. 학부모 상담을 통해 가정에서의 지지 방식을 '결과 중심'에서 '과정 중심'으로 전환하는 것이 병행되어야 합니다."
        :"수험생 자녀와 부모의 갈등은 심리적 소진을 가속화합니다. 지금 학부모 상담에서 명확히 전달해야 할 메시지: '지금 자녀에게 필요한 것은 기대가 아닌 안전망입니다.' 구체적으로: ①성적 관련 대화를 자녀가 먼저 꺼낼 때만 ②결과보다 오늘 노력한 것 1가지 구체적 인정 ③학원·과외 결정은 자녀와 함께 협의."});
  }

  /* ⑥ 유지·심화 */
  if(strats.length===0){
    strats.push({priority:"유지 및 심화 단계",color:"var(--green)",
      title:"강점을 체계화하고 전략적으로 심화할 단계입니다",
      content:level==="E"
        ?"지금 정말 잘하고 있어요! 이 좋은 상태를 유지하면서 조금씩 더 어려운 것에 도전해봐요. 특히 '왜 그럴까?'라는 궁금증이 생기면 찾아보는 습관을 키워봐요. 이 호기심이 나중에 큰 힘이 돼요."
        :level==="M"?"전반적으로 안정적인 학습 심리 상태입니다. 다음 단계 심화 과제: ①지금 가장 약한 요인 1개를 집중 공략 ②희망 고등학교·전공과 현재 학습을 연결한 6개월 로드맵 작성 ③한 단계 높은 난이도 문제에 주 2회 도전. 안정적인 기반 위에 전략적 성장을 추가할 시점입니다."
        :"심리적 역량이 안정적으로 확보된 상태입니다. 이 수준에서 성과를 결정하는 것은 전략의 정교함입니다. 지금 해야 할 일: ①목표 대학 입시 요강을 직접 분석해 역산 계획 수립 ②과목별 취약 유형을 기출 분석으로 정밀하게 파악 ③D-100일 이후 시간표를 지금 미리 설계. 준비된 사람이 기회를 잡습니다."});
  }
  return strats;
}

/* 학부모 메시지 */
function getParentMsg(scores,level,overallAvg){
  const g=k=>scores.find(s=>s.key===k)?.pct||0;
  const se=g("self_efficacy"),ta=g("test_anxiety"),pe=g("positive_emotion"),
        id=g("institute_dep"),sd=g("self_directed"),pr=g("parent_relation"),
        ff=g("fear_failure"),intr=g("intrinsic"),mc=g("metacognition"),
        cg=g("cognitive");

  // 실제 강점/약점 요인 추출
  const top=scores.reduce((a,b)=>a.pct>b.pct?a:b);
  const bottom=scores.reduce((a,b)=>a.pct<b.pct?a:b);

  // 핵심 메시지 방향 결정 (우선순위 순)
  const isAnxious = ta>60||ff>60;
  const isExhausted = pe<40;
  const isDependent = id<45&&sd<45;
  const hasLowSelf = se<45;
  const isStrong = overallAvg>=70;
  const parentTension = pr<45;

  // 초등
  if(level==="E"){
    if(isExhausted||isAnxious)
      return `이 아이에게 지금 가장 필요한 것은 '잘해야 한다'는 압박에서 잠시 벗어나는 것입니다. 검사 결과에서 ${bottom.kr} 영역이 취약하게 나타났는데, 이는 아이가 심리적으로 부담을 느끼고 있다는 신호입니다. 오늘 저녁, 공부 이야기 대신 오늘 가장 즐거웠던 일을 물어봐 주세요. 아이의 마음이 편안해지는 것이 성적 향상의 진짜 출발점입니다.`;
    if(isDependent)
      return `이 아이의 ${top.kr} 역량은 뛰어납니다(${top.pct}점). 이 잠재력이 발휘되려면 스스로 결정하는 경험이 쌓여야 합니다. 오늘 숙제 중 하나를 아이 스스로 선택하게 해보세요. "오늘 뭐부터 할까?" 한 마디가 자기주도성을 키우는 씨앗이 됩니다. 학원보다 이 작은 선택의 경험이 지금 이 아이에게 더 중요합니다.`;
    if(isStrong)
      return `${top.kr} 영역에서 ${top.pct}점이라는 훌륭한 결과가 나왔습니다. 이 아이는 지금 매우 건강한 학습 심리 상태에 있습니다. 현재 가정에서의 지지 방식이 잘 작동하고 있다는 의미이기도 합니다. 지금처럼 아이의 노력 과정을 구체적으로 칭찬해주시고, 결과보다 "오늘 열심히 했구나"라는 말을 자주 해주세요. 이 환경이 유지될 때 아이는 더 크게 성장합니다.`;
    return `이 아이의 ${top.kr} 역량(${top.pct}점)은 분명한 강점입니다. 반면 ${bottom.kr} 영역(${bottom.pct}점)은 조금 더 관심이 필요한 부분입니다. 아이가 어려움을 표현할 때 "그럴 수도 있어, 같이 생각해보자"라고 반응해주세요. 정답을 주는 것보다 아이의 이야기를 끝까지 들어주는 것이 지금 이 시기에 가장 강력한 지원입니다.`;
  }

  // 중등
  if(level==="M"){
    if(isExhausted||isAnxious)
      return `이번 검사에서 ${bottom.kr} 영역(${bottom.pct}점)이 특히 주목됩니다. 이 학생은 현재 심리적 에너지가 많이 소진된 상태일 수 있습니다. 성적보다 먼저 아이의 상태를 점검해주세요. "요즘 힘든 게 있어?"라는 질문 하나가 아이에게는 큰 위로가 됩니다. 공부 관련 대화는 아이가 먼저 꺼낼 때까지 잠시 줄여주시는 것을 권합니다. 심리적 안정이 회복되면 성적은 자연스럽게 따라옵니다.`;
    if(parentTension)
      return `검사 결과에서 ${bottom.kr} 영역이 취약하게 나타났습니다(${bottom.pct}점). 이 시기 학생의 학습 동기는 가정 분위기와 매우 밀접하게 연결되어 있습니다. 성적 결과에 대한 반응보다, 오늘 학교에서 있었던 일을 듣는 시간을 늘려주세요. 부모님의 관심이 '성적'에서 '아이'로 옮겨질 때, 아이의 ${top.kr} 강점(${top.pct}점)이 더욱 빛을 발하게 됩니다.`;
    if(isDependent)
      return `이 학생의 ${top.kr} 역량은 ${top.pct}점으로 뚜렷한 강점입니다. 그러나 ${bottom.kr} 영역(${bottom.pct}점)에서 자기주도적 학습 역량을 더 키울 필요가 있습니다. 고등학교 진학 후 성적을 좌우하는 것은 학원의 수가 아니라 스스로 공부하는 힘입니다. 지금부터 아이가 하루 30분이라도 스스로 계획하고 공부하는 시간을 만들어주세요. 그 시간에 대해 결과가 아닌 '혼자 했다'는 사실 자체를 인정해주시면 큰 변화가 시작됩니다.`;
    if(isStrong)
      return `${top.kr} 영역 ${top.pct}점을 포함해 전반적으로 건강한 학습 심리 상태입니다. 이 학생이 이 수준을 유지할 수 있는 것은 가정에서의 안정적인 지지 덕분이기도 합니다. 지금 이 시기에 가장 중요한 부모님의 역할은 '더 잘하도록 밀어붙이는 것'보다 '지금 잘하고 있다는 것을 알게 해주는 것'입니다. ${bottom.kr} 영역(${bottom.pct}점)은 상담을 통해 구체적인 개선 방향을 함께 잡아가겠습니다.`;
    return `이 학생의 가장 두드러진 강점은 ${top.kr}(${top.pct}점)이며, ${bottom.kr}(${bottom.pct}점) 영역에서 성장 가능성이 있습니다. 중학교 시기는 학습 심리의 틀이 형성되는 중요한 때입니다. 아이가 실수하거나 성적이 기대에 못 미쳤을 때 "이번엔 어디서 막혔어?"라고 함께 탐색하는 태도가, '왜 이것도 못 해'라는 반응보다 훨씬 강력한 성장 동력이 됩니다.`;
  }

  // 고등
  if(isExhausted||isAnxious)
    return `이번 검사에서 ${bottom.kr} 영역이 ${bottom.pct}점으로 나타났습니다. 수험생 자녀가 심리적으로 지쳐있을 때 가장 필요한 것은 추가적인 자극이 아닌 '안전하다'는 느낌입니다. "어떤 결과가 나와도 우리 가족은 괜찮아"라는 메시지를 자녀가 체감할 수 있도록 해주세요. 성적 대화는 자녀가 먼저 꺼낼 때만, 그것도 평가가 아닌 경청으로 반응해주시기를 권합니다. 심리적 안전감이 확보될 때 ${top.kr}(${top.pct}점)이라는 강점이 실제 점수로 전환됩니다.`;
  if(isDependent)
    return `${top.kr} 역량(${top.pct}점)은 수능에서 실질적인 경쟁력이 될 수 있습니다. 다만 ${bottom.kr}(${bottom.pct}점) 영역에서 자기주도적 학습 역량 강화가 필요합니다. 수능은 결국 혼자 보는 시험입니다. 지금 자녀가 학원 없이 3일을 스스로 공부할 수 있는지 점검해보시고, 어렵다면 지금부터 자기주도 루틴을 만드는 것을 가정에서도 함께 지원해주세요. 학원 선택보다 이 방향이 훨씬 중요한 시점입니다.`;
  if(isStrong)
    return `${top.kr}(${top.pct}점)을 포함한 전반적인 학습 심리 역량이 안정적으로 갖춰진 상태입니다. 수험 후반부로 갈수록 심리적 안정이 실력 발휘의 결정적 변수가 됩니다. 지금 자녀에게 필요한 가정의 역할은 '더 열심히'가 아니라 '지금도 충분해'라는 신뢰입니다. ${bottom.kr}(${bottom.pct}점) 영역은 상담을 통해 구체적인 전략으로 보완해 나가겠습니다.`;
  return `이 학생의 ${top.kr} 역량(${top.pct}점)은 수능 준비에서 실질적인 자산입니다. ${bottom.kr}(${bottom.pct}점) 영역은 지금 집중적으로 개선하면 성적 레버리지 효과가 가장 큰 부분입니다. 수험생 자녀를 가장 효과적으로 지원하는 방법은 결과에 대한 반응을 줄이고, 오늘 노력한 것 하나를 구체적으로 인정해주는 것입니다. 이 작은 변화가 자녀의 심리적 내구력을 높이고, 입시 후반부에 흔들리지 않는 힘이 됩니다.`;
}

/* 교과 간 연결 분석 */
function getCrossSubjectHint(subject, scores, level){
  const g=k=>scores.find(s=>s.key===k)?.pct||0;
  const efficacy=g(`${subject.slice(0,3)}_efficacy`)||g("sci_efficacy")||g("soc_efficacy")||0;
  const anxiety=g("math_anxiety")||g("eng_anxiety")||0;
  const interest=g(`${subject.slice(0,3)}_interest`)||0;
  const strategy=g(`${subject.slice(0,3)}_strategy`)||0;

  const hints=[];

  // 교과별 연결 로직
  const connections={
    math:{
      high_efficacy:{
        M:"수학 자신감이 높은 학생은 대체로 물리·화학 등 이과 과목에서도 유리합니다. 고등학교에서 이과 계열을 선택할 때 이 자신감이 핵심 자산이 됩니다.",
        H:"수학 자기효능감이 높으면 수능에서 물리학, 화학, 경제 등 수리적 사고가 필요한 과목에서도 심리적 이점이 있습니다."
      },
      low_anxiety:{
        M:"수학 불안이 낮다는 것은 시험 전반에서 심리적 안정감이 높다는 신호입니다. 이 안정감이 다른 과목 시험에도 긍정적으로 작용할 가능성이 높습니다.",
        H:"수학 불안 조절이 잘 되고 있습니다. 이 심리적 안정감이 수능 전반에서 일관된 컨디션 유지의 기반이 됩니다."
      },
      low_interest:{
        M:"수학 흥미가 낮다면 수학이 필요한 과학·경제 과목에서도 동기가 낮아질 수 있습니다. 수학 흥미를 높이는 것이 연계 과목에도 영향을 줍니다.",
        H:"수학 흥미 저점은 수능에서 수학 점수뿐 아니라 수학 의존도가 높은 선택 과목(물리, 화학, 경제)의 학습 동기에도 영향을 줄 수 있습니다."
      }
    },
    english:{
      high_efficacy:{
        M:"영어 자신감이 높으면 다른 외국어(일본어·중국어) 학습 동기도 높아지는 경향이 있습니다. 언어적 자신감은 전이됩니다.",
        H:"영어 자기효능감이 높습니다. 수능 영어 안정이 다른 과목 학습 시간 확보에도 유리하게 작용합니다. 영어를 일찍 안정시키면 다른 과목에 더 많은 시간을 쓸 수 있습니다."
      },
      low_anxiety:{
        M:"영어 불안이 낮다는 것은 외국어 상황에서 심리적 유연성이 높다는 의미입니다. 이 유연성이 국어 발표·논술 상황에서도 도움이 될 수 있습니다.",
        H:"영어 불안 조절이 잘 되고 있습니다. 수능 영어가 심리적으로 안정되면 다른 과목에 쓸 수 있는 심리 에너지가 늘어납니다."
      },
      high_strategy:{
        M:"영어 학습전략이 잘 갖춰져 있습니다. 이 전략적 학습 방식(문맥 유추, 오답 분류)은 국어 독해와 사회 개념 학습에도 동일하게 적용할 수 있습니다.",
        H:"영어 학습전략 수준이 높습니다. 영어에서 쓰는 하향식 독해 전략(주제 파악 → 세부 내용)은 수능 국어 비문학에도 동일하게 적용 가능합니다."
      }
    },
    korean:{
      high_efficacy:{
        M:"국어 자신감이 높으면 모든 과목의 지문 독해에서 유리합니다. 국어 실력은 다른 모든 과목의 기반이 됩니다.",
        H:"국어 독해력과 자신감이 높습니다. 수능에서 국어 실력은 사회탐구·과학탐구의 지문 독해력에도 직접 영향을 줍니다. 국어 강점이 다른 과목 점수에도 기여합니다."
      },
      low_strategy:{
        M:"국어 학습전략이 낮으면 역사·사회 등 서술형이 많은 과목에서도 어려움이 생길 수 있습니다. 국어 전략 개선이 여러 과목에 동시 효과를 냅니다.",
        H:"국어 학습전략 저점은 수능 전반에 영향을 줍니다. 수능 사회탐구·생활과 윤리 등의 지문 독해도 국어 전략 역량에 의존하기 때문입니다."
      }
    },
    science:{
      high_inquiry:{
        M:"탐구 태도가 적극적입니다. 이 태도는 수학의 원리 탐구, 사회의 인과관계 분석에도 그대로 전이됩니다. 탐구적 사고가 문과·이과 모두에서 자산이 됩니다.",
        H:"과학 탐구 태도가 우수합니다. 이 태도는 수능 과학뿐 아니라 수학 문제의 원리 분석에도 그대로 적용됩니다. 두 과목이 시너지를 낼 수 있는 구조입니다."
      },
      low_interest:{
        M:"과학 흥미가 낮으면 수학의 실생활 연결(물리 응용)에서도 동기가 낮아질 수 있습니다. 과학의 재미를 찾는 것이 수학 흥미에도 긍정적 영향을 줄 수 있습니다.",
        H:"과학 흥미 저점은 선택 과목 공부 지속성에 영향을 줍니다. 흥미보다 목표(의학, 공학, 이과 계열)와의 연결로 동기를 대체하는 것이 현실적 전략입니다."
      }
    },
    social:{
      high_interest:{
        M:"사회에 관심이 높습니다. 이 관심이 현재 시사 이슈와 연결되면 국어 비문학 독해력에도 도움이 됩니다. 뉴스를 읽는 습관이 국어·사회를 동시에 키웁니다.",
        H:"사회탐구 흥미가 있습니다. 선택 과목에 관심이 있다면 단순 암기를 넘어 개념을 시사 이슈에 적용하는 연습이 수능에서 변별력 있는 문제 풀이에 도움이 됩니다."
      },
      low_burden:{
        M:"사회 암기 부담이 크다면 다른 암기 과목(역사, 도덕)에서도 비슷한 어려움을 느낄 수 있습니다. 암기 전략(구조화, 연관 짓기)을 익히면 여러 과목에 함께 적용할 수 있습니다.",
        H:"사회탐구 암기 부담이 수험 전반의 시간 배분을 압박하고 있을 수 있습니다. 선택 과목을 2개로 제한하고 각 과목의 핵심 개념 구조화에 집중하는 것이 효율적입니다."
      }
    }
  };

  const subj_conn = connections[subject];
  if(!subj_conn) return null;

  // 점수 기반으로 해당하는 힌트 선택
  const efficacyKey=`${subject.slice(0,4)}_efficacy`;
  const efficacyScore=scores.find(s=>s.key===efficacyKey)?.pct||0;
  const anxietyKey=subject==="math"?"math_anxiety":subject==="english"?"eng_anxiety":null;
  const anxietyScore=anxietyKey?scores.find(s=>s.key===anxietyKey)?.pct||0:50;
  const interestKey=`${subject.slice(0,4)}_interest`||`sci_interest`||`soc_interest`;
  const interestScore=scores.find(s=>s.key===interestKey)?.pct||0;
  const stratKey=`${subject.slice(0,4)}_strategy`||`sci_strategy`;
  const stratScore=scores.find(s=>s.key===stratKey)?.pct||0;
  const inquiryScore=scores.find(s=>s.key==="sci_inquiry")?.pct||0;
  const burdenScore=scores.find(s=>s.key==="soc_burden")?.pct||0;

  // 레벨 M/H만 연결 멘트 표시 (E는 단순하게)
  if(level==="E") return null;

  if(efficacyScore>=70 && subj_conn.high_efficacy?.[level])
    return subj_conn.high_efficacy[level];
  if(anxietyScore>=70 && subj_conn.low_anxiety?.[level])
    return subj_conn.low_anxiety[level];
  if(interestScore<40 && subj_conn.low_interest?.[level])
    return subj_conn.low_interest[level];
  if(stratScore>=70 && subj_conn.high_strategy?.[level])
    return subj_conn.high_strategy[level];
  if(stratScore<40 && subj_conn.low_strategy?.[level])
    return subj_conn.low_strategy[level];
  if(inquiryScore>=70 && subj_conn.high_inquiry?.[level])
    return subj_conn.high_inquiry[level];
  if(interestScore>=70 && subj_conn.high_interest?.[level])
    return subj_conn.high_interest[level];
  if(burdenScore<40 && subj_conn.low_burden?.[level])
    return subj_conn.low_burden[level];

  return null;
}

function SubjectSection({studentData,subject}){
  const [subjAns,setSubjAns]=useState(null);
  useEffect(()=>{
    dbGet(`tlp_subj_answers_${studentData.id}_${subject}`).then(a=>setSubjAns(a));
  },[]);

  if(!subjAns) return(
    <div className="card" style={{marginBottom:12,color:"var(--text-light)",fontSize:13}}>
      {SUBJECT_INFO[subject]?.label} 결과 로딩 중...
    </div>
  );

  const level=studentData.level||"M";
  const SECTIONS=buildSubjectSections(subject,level);
  const scores=SECTIONS.map(s=>({...s,pct:calcSubjectScore(subjAns,s)}));
  const overall=getSubjectOverallComment(subject,scores,level,studentData.name);
  const subjectColor=SUBJECT_INFO[subject]?.color||"var(--purple)";

  return(
    <div style={{marginBottom:28}}>
      {/* 과목 구분 헤더 — 결과지/PDF에서 명확히 구분 */}
      <div style={{
        display:"flex",alignItems:"center",gap:12,
        margin:"32px 0 16px",padding:"14px 18px",
        background:`linear-gradient(135deg,${subjectColor}18,${subjectColor}08)`,
        borderRadius:10,borderLeft:`5px solid ${subjectColor}`,
        pageBreakBefore:"always"
      }}>
        <div style={{flex:1}}>
          <div style={{fontSize:11,fontWeight:700,color:subjectColor,letterSpacing:1.5,marginBottom:3,opacity:0.8}}>
            교과별 학습심리 검사 결과
          </div>
          <div style={{fontFamily:"'Noto Serif KR',serif",fontSize:20,fontWeight:700,color:subjectColor}}>
            {SUBJECT_INFO[subject]?.label} 영역
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontFamily:"'Noto Serif KR',serif",fontSize:30,fontWeight:700,color:overall.avg>=75?"var(--green)":overall.avg>=55?"var(--amber)":"var(--red)"}}>
            {overall.avg}점
          </div>
          <div style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10,display:"inline-block",marginTop:2,
            background:overall.avg>=75?"var(--green-bg)":overall.avg>=55?"var(--amber-bg)":"var(--red-bg)",
            color:overall.avg>=75?"var(--green)":overall.avg>=55?"var(--amber)":"var(--red)"
          }}>{overall.grade}</div>
        </div>
      </div>

      {/* 교과 헤더 카드 — 점수/등급은 위 헤더에 이미 표시되므로 생략 */}
      <div className="card" style={{marginBottom:12,borderLeft:`4px solid ${subjectColor}`}}>
        <div style={{fontSize:13,color:"var(--text-mid)",lineHeight:1.85,marginBottom:10,wordBreak:"keep-all"}}>{overall.intro}</div>
        <div style={{display:"flex",gap:16,fontSize:13,paddingTop:10,borderTop:"1px solid var(--border)",flexWrap:"wrap"}}>
          <div><span style={{color:"var(--text-light)"}}>가장 강한 요인 </span><strong style={{color:"var(--green)"}}>{overall.top.kr} {overall.top.pct}점</strong></div>
          <div><span style={{color:"var(--text-light)"}}>가장 약한 요인 </span><strong style={{color:"var(--red)"}}>{overall.bottom.kr} {overall.bottom.pct}점</strong></div>
        </div>
      </div>
      {/* 교과 간 연결 분석 */}
      {(()=>{const hint=getCrossSubjectHint(subject,scores,level);return hint?(
        <div style={{marginBottom:12,padding:"12px 16px",background:"var(--purple-pale)",borderRadius:8,border:"1px solid var(--border-s)",display:"flex",gap:10,alignItems:"flex-start"}}>
          <span style={{fontSize:16,flexShrink:0}}>🔗</span>
          <div style={{fontSize:12,color:"var(--purple)",lineHeight:1.75,wordBreak:"keep-all"}}>
            <strong style={{fontSize:11,letterSpacing:0.5}}>교과 연결 분석</strong><br/>
            {hint}
          </div>
        </div>
      ):null;})()}
      {/* 교과 요인별 카드 */}
      {scores.map(s=>{
        const lv=getLevel(s.pct);
        const comment=getSubjectFactorComment(s.key,s.pct,level);
        const sc=s.pct>=70?"var(--green)":s.pct>=40?"var(--amber)":"var(--red)";
        return(
          <div key={s.key} className="factor-card" style={{marginBottom:10}}>
            <div className="factor-card-header">
              <div>
                <div className="factor-card-area" style={{color:subjectColor}}>{SUBJECT_INFO[subject]?.label}</div>
                <div className="factor-card-name">{s.kr}<span className="factor-card-en">{s.en}</span></div>
              </div>
              <div className="factor-card-score-wrap">
                <span className="factor-card-score" style={{color:sc}}>{s.pct}점</span>
                <span className={`lv-badge ${lv.cls}`}>{lv.label}</span>
              </div>
            </div>
            <div className="factor-hint">"{s.hint}"</div>
            <div style={{marginBottom:10}}>
              <div className="fbar-wrap" style={{height:6}}>
                <div className="fbar-fill" style={{width:`${s.pct}%`,background:getBarColor(s.pct)}}/>
              </div>
            </div>
            <div className="factor-comment" style={{wordBreak:"keep-all"}}>{comment}</div>
          </div>
        );
      })}
    </div>
  );
}

function ResultPage({studentData,answers,isDirectLink=false}){
  const [toast,setToast]=useState("");
  const level=studentData.level||"M";
  const SECTIONS=buildSections(level);
  const scores=SECTIONS.map(s=>({...s,pct:calcScore(answers,s)}));
  const areaAvgs=AREAS.map(a=>{
    const ss=scores.filter(s=>s.area===a);
    return{area:a,avg:Math.round(ss.reduce((x,s)=>x+s.pct,0)/ss.length)};
  });
  const overallAvg=Math.round(areaAvgs.reduce((x,a)=>x+a.avg,0)/areaAvgs.length);
  const areaScores=areaAvgs.map(a=>a.avg);
  const sorted=[...scores].sort((a,b)=>b.pct-a.pct);
  const strengths=sorted.slice(0,3);
  const weaknesses=sorted.slice(-3).reverse();
  const grade=getGrade(overallAvg);
  const pattern=detectPattern(scores,level);
  const strategies=getStrategies(scores,level,overallAvg);
  const parentMsg=getParentMsg(scores,level,overallAvg);

  const gradeColor=overallAvg>=80?"var(--green)":overallAvg>=65?"var(--blue)":overallAvg>=50?"var(--gray-500)":"var(--red)";

  function copyResultLink(){
    navigator.clipboard.writeText(`${location.origin}${location.pathname}?result=${studentData.id}`)
      .then(()=>setToast("결과지 링크가 복사되었습니다!"));
  }

  const levelLabel=level==="E"?"초등학교":level==="M"?"중학교":"고등학교";

  return(
    <div className="page"><Header/>

      {/* 상단 버튼 */}
      <div className="no-print" style={{display:"flex",justifyContent:isDirectLink?"flex-end":"space-between",alignItems:"center",gap:8,marginBottom:16}}>
        {!isDirectLink&&<button onClick={()=>window.location.href=location.pathname} style={{padding:"7px 14px",borderRadius:4,fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid var(--border-s)",background:"var(--purple-pale)",color:"var(--purple)",fontFamily:"'Noto Sans KR',sans-serif"}}>
          ← 관리자 홈
        </button>}
        <button onClick={()=>handlePrint()} style={{padding:"7px 14px",borderRadius:4,fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid var(--border-s)",background:"var(--gray-100)",color:"var(--gray-900)",fontFamily:"'Noto Sans KR',sans-serif",transition:"all 0.14s"}}>
          PDF 저장
        </button>
      </div>

      {/* 커버 */}
      <div className="result-cover">
        <div className="result-cover-name">{studentData.name} 학생의 학습심리 진단 결과</div>
        <div className="result-cover-sub">필탑 학습심리 진단검사 · {levelLabel}용</div>
        <div className="result-info-row">
          {studentData.schoolName&&<span className="result-info-chip">{studentData.schoolName}</span>}
          <span className="result-info-chip">{studentData.school} {studentData.grade}</span>
          {studentData.studentPhone&&<span className="result-info-chip">학생 {studentData.studentPhone}</span>}
          {studentData.parentPhone&&<span className="result-info-chip">학부모 {studentData.parentPhone}</span>}
        </div>
        <div className="result-total-score">
          <span style={{fontSize:14,color:"rgba(240,216,168,0.6)"}}>종합 점수</span>
          <span className="score-num">{overallAvg}</span>
          <span className="score-unit">점</span>
          <span className="score-grade">{grade}</span>
        </div>
        <div className="result-date">{new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric"})} 검사 완료</div>
      </div>

      {/* 연구 근거 명시 */}
      <div style={{marginBottom:18,padding:"11px 16px",background:"rgba(26,58,106,0.07)",border:"1px solid rgba(26,58,106,0.15)",borderRadius:5,fontSize:12,color:"var(--blue)",lineHeight:1.75}}>
        본 검사는 <strong>Bandura(1997) 자기효능감 이론</strong>, <strong>Ryan&Deci(2000) 자기결정이론</strong>, <strong>Spielberger(1980) 시험불안 척도</strong>, <strong>Flavell(1979) 메타인지 이론</strong>, <strong>Zimmerman(2000) 자기조절학습 모델</strong> 등 국제적으로 검증된 학습심리 이론을 기반으로 설계되었습니다.
      </div>

      {/* 학습자 패턴 */}
      <div className="card" style={{marginBottom:18,borderLeft:`4px solid ${pattern.color}`}}>
        <div style={{fontSize:11,fontWeight:700,color:"var(--gray-500)",letterSpacing:1.5,marginBottom:6}}>학습자 패턴 분류</div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <span style={{fontFamily:"'Noto Serif KR',serif",fontSize:18,fontWeight:700,color:pattern.color}}>{pattern.name}</span>
          <span style={{fontFamily:"'Noto Serif KR',serif",fontSize:28,fontWeight:700,color:gradeColor}}>{overallAvg}점</span>
          <span style={{fontSize:13,fontWeight:700,padding:"3px 10px",borderRadius:3,background:`${gradeColor}18`,color:gradeColor,border:`1px solid ${gradeColor}30`}}>{grade}</span>
        </div>
        <div style={{fontSize:14,color:"var(--text-mid)",lineHeight:1.88}}>{pattern.desc}</div>
        <div style={{display:"flex",gap:20,flexWrap:"wrap",fontSize:13,marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}}>
          <div><span style={{color:"var(--gray-500)",opacity:0.7}}>최고 영역 </span><strong style={{color:"var(--green)"}}>{areaAvgs.reduce((a,b)=>a.avg>b.avg?a:b).area} {areaAvgs.reduce((a,b)=>a.avg>b.avg?a:b).avg}점</strong></div>
          <div><span style={{color:"var(--gray-500)",opacity:0.7}}>취약 영역 </span><strong style={{color:"var(--red)"}}>{areaAvgs.reduce((a,b)=>a.avg<b.avg?a:b).area} {areaAvgs.reduce((a,b)=>a.avg<b.avg?a:b).avg}점</strong></div>
        </div>
      </div>

      {/* 영역 칩 */}
      <div className="area-chips">
        {areaAvgs.map(a=>{const lv=getLevel(a.avg);return(
          <div key={a.area} className="area-chip">
            <div className="area-chip-label">{a.area}</div>
            <div className="area-chip-score">{a.avg}</div>
            <div className={`area-chip-lv lv-badge ${lv.cls}`}>{lv.label}</div>
          </div>);})}
      </div>

      {/* 차트 2개 */}
      <div className="chart-grid" style={{marginBottom:18}}>
        <div className="chart-sec">
          <div className="chart-title">역량 프로파일</div>
          <div className="chart-sub">5개 영역 분포</div>
          <RadarChart areaScores={areaScores}/>
        </div>
        <div className="chart-sec">
          <div className="chart-title">영역별 점수</div>
          <div className="chart-sub">0~100점 기준</div>
          <HBarChart areaScores={areaScores}/>
        </div>
      </div>

      {/* 강점/약점 */}
      <div className="two-col-grid" style={{marginBottom:18}}>
        <div className="card" style={{padding:"18px 20px"}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--green)",letterSpacing:1,marginBottom:12}}>상위 강점 요인</div>
          {strengths.map(s=>(
            <div key={s.key} style={{marginBottom:10,paddingBottom:10,borderBottom:"1px solid var(--border)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <div style={{fontSize:13,fontWeight:700,color:"var(--gray-900)"}}>{s.kr}</div>
                <div style={{fontFamily:"'Noto Serif KR',serif",fontSize:18,fontWeight:700,color:"var(--green)"}}>{s.pct}<span style={{fontSize:10}}>점</span></div>
              </div>
              <div style={{fontSize:10,color:"var(--gray-500)",opacity:0.6}}>{s.area} · {s.en}</div>
            </div>))}
        </div>
        <div className="card" style={{padding:"18px 20px"}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--red)",letterSpacing:1,marginBottom:12}}>개선 필요 요인</div>
          {weaknesses.map(s=>(
            <div key={s.key} style={{marginBottom:10,paddingBottom:10,borderBottom:"1px solid var(--border)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <div style={{fontSize:13,fontWeight:700,color:"var(--gray-900)"}}>{s.kr}</div>
                <div style={{fontFamily:"'Noto Serif KR',serif",fontSize:18,fontWeight:700,color:"var(--red)"}}>{s.pct}<span style={{fontSize:10}}>점</span></div>
              </div>
              <div style={{fontSize:10,color:"var(--gray-500)",opacity:0.6}}>{s.area} · {s.en}</div>
            </div>))}
        </div>
      </div>

      {/* 전략 조언 */}
      <div className="card" style={{marginBottom:18}}>
        <div style={{fontSize:11,fontWeight:700,color:"var(--blue)",letterSpacing:1.5,marginBottom:14}}>진단 기반 전략 조언</div>
        {strategies.map((s,i)=>(
          <div key={i} style={{marginBottom:i<strategies.length-1?16:0,paddingBottom:i<strategies.length-1?16:0,borderBottom:i<strategies.length-1?"1px solid var(--border)":"none"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
              <span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:3,background:`${s.color}15`,color:s.color,border:`1px solid ${s.color}30`,whiteSpace:"nowrap"}}>{s.priority}</span>
              <span style={{fontSize:14,fontWeight:700,color:"var(--gray-900)"}}>{s.title}</span>
            </div>
            <div style={{fontSize:13,color:"var(--text-mid)",lineHeight:1.88,paddingLeft:4}}>{s.content}</div>
          </div>))}

      {/* 학부모 메시지 */}
      <div style={{marginBottom:24,padding:"16px 20px",background:"rgba(42,22,8,0.05)",borderRadius:6,border:"1px solid var(--border)",borderLeft:"3px solid var(--purple)"}}>

        <div style={{fontSize:14,color:"var(--text-mid)",lineHeight:1.9,fontStyle:"italic"}}>{parentMsg}</div>
      </div>

      {/* 영역별 상세 분석 */}
      {AREAS.map(area=>{
        const areaAvg=areaAvgs.find(a=>a.area===area)?.avg||0;
        const areaLv=getLevel(areaAvg);
        const areaScoreList=scores.filter(s=>s.area===area);
        return(
          <div key={area}>
            <div className="section-header">
              <span className="section-header-kr">{area}</span>
              <span className="section-header-en">{AREA_EN[area]}</span>

                <span style={{fontFamily:"'Noto Serif KR',serif",fontSize:13,fontWeight:700,color:"var(--gray-900)"}}>{area} 종합</span>
                <span style={{fontFamily:"'Noto Serif KR',serif",fontSize:20,fontWeight:700,color:areaAvg>=70?"var(--green)":areaAvg>=40?"var(--purple)":"var(--red)"}}>{areaAvg}점</span>
                <span className={`lv-badge ${areaLv.cls}`}>{areaLv.label}</span>
              </div>
            </div>

            {/* 요인 테이블 */}
            <div className="card" style={{padding:0,overflow:"hidden",marginBottom:12}}>
              <table className="factor-table">
                <thead>
                  <tr>
                    <th style={{width:"22%"}}>요인</th>
                    <th style={{width:"36%"}}>점수 분포</th>
                    <th style={{width:"12%",textAlign:"center"}}>점수</th>
                    <th style={{width:"12%",textAlign:"center"}}>수준</th>
                    <th style={{width:"18%",textAlign:"center"}}>진단</th>
                  </tr>
                </thead>
                <tbody>
                  {areaScoreList.map(s=>{
                    const lv=getLevelByKey(s.key,s.pct);
                    const diag=s.pct>=70?"강점 유지":s.pct>=55?"양호":s.pct>=40?"보통":"집중 관리";
                    const dc=s.pct>=70?"var(--green)":s.pct>=55?"var(--blue)":s.pct>=40?"var(--gray-500)":"var(--red)";
                    return(
                      <tr key={s.key}>
                        <td><div style={{fontWeight:700,fontSize:13,color:"var(--gray-900)"}}>{s.kr}</div><div style={{fontSize:10,color:"var(--gray-500)",opacity:0.55,marginTop:2}}>{s.en}</div></td>
                        <td><div className="fbar-wrap"><div className="fbar-fill" style={{width:`${s.pct}%`,background:getBarColor(s.pct)}}/></div></td>
                        <td style={{textAlign:"center"}}><span className="fscore">{s.pct}</span><span style={{fontSize:11,color:"var(--gray-500)"}}>점</span></td>
                        <td style={{textAlign:"center"}}><span className={`lv-badge ${lv.cls}`}>{lv.label}</span></td>
                        <td style={{textAlign:"center",fontSize:11,fontWeight:700,color:dc}}>{diag}</td>
                      </tr>);

                </tbody>
              </table>
            </div>

            {/* 요인별 상세 카드 */}
            {areaScoreList.map(s=>{
              const lv=getLevelByKey(s.key,s.pct);
              const comment=getFactorComment(s.key,s.pct,level);
              const scoreColor=s.pct>=70?"var(--green)":s.pct>=40?"var(--purple)":"var(--red)";
              return(
                <div key={s.key} className="factor-card">
                  <div className="factor-card-header">
                    <div>
                      <div className="factor-card-area">{s.area}</div>
                      <div className="factor-card-name">{s.kr}<span className="factor-card-en">{s.en}</span></div>
                    </div>
                    <div className="factor-card-score-wrap">
                      <span className="factor-card-score" style={{color:scoreColor}}>{s.pct}점</span>
                      <span className={`lv-badge ${lv.cls}`}>{lv.label}</span>
                    </div>
                  </div>
                  <div className="factor-hint">"{s.hint}"</div>
                  <div className="factor-comment">{comment}</div>
                </div>);
            })}
            <div style={{height:8}}/>
          </div>);
      })}

      {/* 교과별 통합 결과 — 종합검사 완료 후 교과 결과도 있으면 표시 */}
      {studentData.doneSubjects?.length>0&&(
        <div style={{marginTop:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10,margin:"28px 0 16px",paddingBottom:10,borderBottom:"2px solid var(--purple)"}}>
            <span style={{fontFamily:"'Noto Serif KR',serif",fontSize:16,fontWeight:700,color:"var(--gray-900)"}}>교과별 학습심리 결과</span>
            <span style={{fontSize:11,color:"var(--text-light)"}}>Subject Results</span>
          </div>
          {studentData.doneSubjects.map(subj=>(
            <SubjectSection key={subj} studentData={studentData} subject={subj}/>
          ))}
        </div>
      )}

      {/* 결과지 하단 전화 문의 */}
      <div className="no-print" style={{marginTop:8,padding:"16px 20px",background:"var(--purple-pale)",borderRadius:10,border:"1px solid var(--border-s)"}}>
        <div style={{fontSize:12,fontWeight:700,color:"var(--purple)",marginBottom:10,letterSpacing:0.5}}>결과 상담 문의</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <a href="tel:031-274-1334" style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"12px 8px",background:"#fff",border:"1px solid var(--border-s)",borderRadius:8,textDecoration:"none",color:"var(--purple)"}}>
            <span style={{fontSize:11,fontWeight:700,marginBottom:3}}>초·중등관</span>
            <span style={{fontSize:14,fontWeight:700}}>031-274-1334</span>
            <span style={{fontSize:11,marginTop:3,color:"var(--gray-500)"}}>📞 전화 연결</span>
          </a>
          <a href="tel:031-275-1435" style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"12px 8px",background:"#fff",border:"1px solid var(--border-s)",borderRadius:8,textDecoration:"none",color:"var(--purple)"}}>
            <span style={{fontSize:11,fontWeight:700,marginBottom:3}}>고등관</span>
            <span style={{fontSize:14,fontWeight:700}}>031-275-1435</span>
            <span style={{fontSize:11,marginTop:3,color:"var(--gray-500)"}}>📞 전화 연결</span>
          </a>
        </div>
      </div>

      {toast&&<Toast msg={toast} onClose={()=>setToast("")}/>}
    </div>
  );
}

function buildSubjectSections(subject,level){
  return SUBJECT_INFO[subject].factors.map(key=>{
    const f=SQB[key];
    return{key,kr:f.kr,en:f.en,hint:f.hint[level],questions:f.questions[level]};
  });
}

function calcSubjectScore(ans,sec){
  let t=0,c=0;
  sec.questions.forEach(q=>{const v=ans[q.id];if(v!==undefined){t+=q.reverse?(7-v):v;c++;}});
  return c?Math.round(((t/c-1)/5)*100):0;
}

      : `'${top.kr}'이(가) 핵심 강점(${top.pct}점)입니다. 이 역량을 레버리지로 활용해 약점 요인을 집중 공략하세요.`

      : `'${bottom.kr}'이(가) 취약점(${bottom.pct}점)입니다. 이 요인을 방치하면 실력 대비 점수 손실이 지속됩니다. 지금 당장 집중 처방이 필요합니다.`
    : "";

  const intro = [trait, strengthAdvice, weaknessAdvice].filter(Boolean).join(" ");

  return{avg,grade,intro,top,bottom};
}

    math_anxiety:{
      E:{h:"수학 시험에서 긴장을 잘 조절하는 편이에요. 알고 있는 실력을 그대로 발휘할 수 있는 좋은 상태예요. 지금처럼 편안하게 준비하면 돼요.",m:"수학 시험 전에 약간 긴장하는 건 자연스러운 거예요. 적당한 긴장은 오히려 도움이 되기도 해요. 다만 너무 심해지지 않도록 시험 전에 심호흡하는 루틴을 만들어봐요.",l:"수학만 생각하면 너무 무섭고 불안한 마음이 크지 않나요? 이 마음이 크면 알고 있는 것도 시험에서 잘 못 나올 수 있어요. 선생님이나 부모님께 솔직하게 말하고, 쉬운 문제부터 편안하게 하는 연습을 조금씩 해봐요."},
      M:{h:"수학 불안 조절을 잘 하고 있습니다. 시험 상황에서 평정심을 유지하며 실력을 안정적으로 발휘할 수 있는 상태입니다. 이 심리적 안정감이 수학 성취의 든든한 기반입니다.",m:"수학 불안이 보통 수준입니다. 시험 전 적당한 긴장은 수행을 향상시킵니다. 다만 시험이 가까워질수록 불안이 상승할 수 있으니 시험 전 루틴(일정한 준비 패턴)을 지금부터 만들어두세요.",l:"수학 불안이 높습니다. 실제 수학 실력보다 낮은 점수가 나올 가능성이 있습니다. 불안 자체를 줄이는 것이 수학 공부보다 먼저입니다. 시험 전 호흡 조절 연습, 쉬운 문제부터 시작하는 루틴을 만들어야 합니다."},
      H:{h:`수학 불안 조절 우수(${pct}점). 수능 수학에서 평소 실력을 안정적으로 발휘할 수 있는 심리 조건이 갖춰져 있습니다. 수학 시험에서의 심리적 강점이 실질적인 득점 우위로 이어집니다.`,m:`수학 불안 중간(${pct}점). 수능이 가까워질수록 상승할 가능성이 있습니다. 모의고사를 실제 수능과 동일한 조건으로 반복 응시하여 시험 환경에 대한 내성을 키우세요.`,l:`수학 불안 고점(${pct}점). 지금 수학 실력의 70~80%만 시험에서 발휘되고 있을 가능성이 있습니다. 공부량보다 불안 관리가 먼저입니다. 시험 전 고정 의식(루틴), 호흡 조절, 쉬운 문제 먼저 풀기 전략을 즉시 도입하세요.`}
    },
    math_interest:{
      E:{h:"수학이 재미있고 문제를 풀면 뿌듯함을 느끼는군요! 이런 마음이 있으면 어려운 수학도 즐겁게 도전할 수 있어요. 정말 좋은 마음의 힘이에요.",m:"어떤 내용은 재미있고 어떤 건 지루할 때도 있죠. 재미있는 부분에서 시작해서 성취감을 먼저 느껴보세요. 그러면 조금 어려운 내용도 해볼 수 있게 돼요.",l:"수학이 재미없고 하기 싫은 마음이 크군요. 억지로 흥미를 만들 순 없지만, 수학이 실생활에서 어떻게 쓰이는지 찾아보거나 쉬운 퍼즐부터 시작해보면 조금씩 달라질 수 있어요."},
      M:{h:"수학 흥미가 높습니다. 수학적 원리에서 지적 즐거움을 찾고 있는 상태로, 이 흥미가 어려운 단원에서도 학습 지속성을 높이는 핵심 동력이 됩니다.",m:"수학 흥미가 보통 수준입니다. 문제가 잘 풀릴 때는 즐겁지만 막힐 때는 흥미가 급감하는 패턴이 있을 수 있습니다. 수학의 실생활 연결(통계, 물리, 경제)을 찾아보면 흥미가 유지되는 데 도움이 됩니다.",l:"수학 흥미가 낮습니다. 수학을 의무로만 느끼고 있을 가능성이 높습니다. 흥미 없이 공부량을 늘리면 쉽게 지칩니다. 목표 진로와 수학의 연결 지점을 찾거나, 흥미로운 수학 콘텐츠(EBS수학, 수학 유튜브)를 먼저 접해보세요."},
      H:{h:`수학 흥미 고점(${pct}점). 수험 환경에서 수학적 사고 자체에서 지적 자극을 받고 있습니다. 이 흥미가 장기 수험 생활의 번아웃을 막아주는 핵심 완충재입니다.`,m:`수학 흥미 중간(${pct}점). 수능 수학은 흥미가 없어도 전략적으로 접근 가능합니다. 단, 흥미 저하가 지속되면 학습 의지 자체가 흔들릴 수 있으므로 지금 목표 점수와 전략에서 의미를 찾는 것이 중요합니다.`,l:`수학 흥미 저점(${pct}점). 수학을 순수히 수능 점수 도구로 인식하고 있는 상태입니다. 흥미 대신 목적의식으로 접근하세요. 목표 대학·학과에서 수학이 왜 필요한지를 명확히 하면 흥미 없이도 움직이는 이유가 생깁니다.`}
    },
    math_strategy:{
      E:{h:"수학 공부 방법이 정말 좋아요! 문제를 그냥 외우는 게 아니라 '왜 그런지' 이해하면서 공부하고 있어요. 이 방법으로 계속 하면 수학이 점점 더 잘 될 거예요.",m:"어느 정도 방법은 있지만, 틀린 문제를 왜 틀렸는지 꼼꼼히 확인하는 습관이 더 필요해요. 오답 노트를 만들어서 틀린 이유를 하나씩 적어보는 것이 도움이 돼요.",l:"지금 수학을 공부하는 방법을 바꿔야 할 것 같아요. 문제를 그냥 여러 번 보거나 답을 외우는 것보다, '왜 이렇게 풀지?'를 생각하는 습관이 훨씬 중요해요. 선생님과 함께 공부 방법부터 다시 세워봐요."},
      M:{h:"수학 학습전략이 잘 갖춰져 있습니다. 개념 이해 중심 학습과 오답 원인 분석이 체계화되어 있어, 같은 시간을 공부해도 성과가 높습니다. 지금 전략을 고등 수학에도 그대로 적용하세요.",m:"수학 학습전략이 보통 수준입니다. 기본적인 풀이법은 익혔지만 오답 원인 분석이 부족합니다. 틀린 문제를 개념 오류·풀이 실수·계산 실수로 구분하는 습관만 추가해도 성적이 달라집니다.",l:"수학 학습전략이 낮습니다. 공식 암기와 유형 반복에 의존하는 경향이 강합니다. 지금 수학 공부 방법 자체를 재설계해야 합니다. 개념 이해 → 원리 적용 → 오답 분석의 순서로 바꾸세요."},
      H:{h:`수학 학습전략 고점(${pct}점). 개념 이해와 오답 분류 분석이 체계화된 상태입니다. 수능 수학 고득점의 가장 직접적인 기반이 되는 역량입니다. 약점 단원에 이 전략을 더욱 정교하게 적용하세요.`,m:`수학 학습전략 중간(${pct}점). 수능 수학은 유형 암기보다 개념 적용력에서 점수가 갈립니다. 오답 분석 시 '왜 틀렸는가'를 개념·풀이·계산으로 3분류하는 루틴을 즉시 도입하세요.`,l:`수학 학습전략 저점(${pct}점). 지금 수학 공부량보다 방법이 문제입니다. 개념 이해 없이 유형 암기에만 의존하면 수능 3점짜리 고난이도 문제에서 반드시 막힙니다. 공부 방식 전면 재설계가 필요합니다.`}
    },

    /* ══ 영어 ══ */
    eng_efficacy:{
      E:{h:"영어에 대한 자신감이 높아요! 어려운 영어 문장을 만나도 포기하지 않고 도전하는 힘이 있어요. 이 자신감이 영어 실력을 계속 키워줄 거예요.",m:"쉬운 영어는 잘 하는데 어렵거나 낯선 표현을 만나면 자신감이 흔들릴 때가 있어요. 모르는 단어가 나왔을 때 문맥으로 유추해보는 연습을 해봐요.",l:"지금 영어가 많이 어렵고 '나는 영어를 못해'라는 생각이 강한 것 같아요. 영어는 지금 시작해도 충분히 늘릴 수 있어요. 오늘 단어 5개부터, 짧고 쉬운 문장부터 시작해봐요."},
      M:{h:"영어 자기효능감이 높습니다. 영어 학습에서 어려운 상황을 만나도 포기하지 않고 방법을 찾는 힘이 있습니다. 이 믿음이 영어 실력 향상의 핵심 동력입니다.",m:"영어 자기효능감이 중간 수준입니다. 기본적인 영어는 할 수 있지만 어려운 지문이나 표현에서 자신감이 떨어집니다. 지금 수준보다 약간 어려운 지문을 꾸준히 읽어가며 성공 경험을 쌓으세요.",l:"영어 자기효능감이 낮습니다. 영어에 대한 두려움이 학습 자체를 가로막고 있을 수 있습니다. 영어 실력은 반드시 노력으로 향상됩니다. 오늘 당장 가장 쉬운 수준의 영어 지문 하나를 완전히 해석해보는 것부터 시작하세요."},
      H:{h:`영어 자기효능감 고점(${pct}점). 수능 영어 고난이도 문항에서도 포기하지 않고 의미를 추론하는 심리적 자원이 확보되어 있습니다. 이 역량이 실제 1등급 달성과 직결됩니다.`,m:`영어 자기효능감 중간(${pct}점). 어려운 영어 지문에서 자신감이 흔들리면 독해 속도가 급격히 저하됩니다. 매일 수능 수준 지문을 1~2개씩 분석하며 성공 경험을 누적하세요.`,l:`영어 자기효능감 저점(${pct}점). 영어 학습에서 실패 경험이 누적되어 도전 자체를 회피하고 있을 가능성이 있습니다. 지금 수준보다 쉬운 영어 지문부터 완전 해석에 성공하는 경험을 쌓아야 합니다.`}
    },
    eng_anxiety:{
      E:{h:"영어 시험에서 긴장을 잘 다스리는 편이에요. 편안한 마음으로 영어 공부를 할 수 있어서 실력이 잘 쌓일 수 있는 좋은 상태예요.",m:"영어 시험이나 말할 때 약간 긴장되는 건 자연스러운 거예요. 너무 무서워하지 않아도 돼요. 자주 연습하다 보면 점점 편안해질 거예요.",l:"영어가 너무 무섭고 불안한 마음이 크지 않나요? 이 마음이 너무 크면 알고 있는 것도 시험에서 못 나올 수 있어요. 영어 노래나 짧은 영어 영상 보기처럼 부담 없는 것부터 시작해봐요."},
      M:{h:"영어 불안 조절을 잘 하고 있습니다. 영어 시험이나 표현 상황에서 평정심을 유지하고 있어, 실제 영어 실력이 잘 발휘됩니다. 이 심리적 안정이 영어 학습 효율을 높입니다.",m:"영어 불안이 보통 수준입니다. 시험 상황에서 어느 정도 긴장이 있지만 수행을 크게 방해하지는 않습니다. 영어 시험 환경에 익숙해지도록 모의 시험 연습을 늘리세요.",l:"영어 불안이 높습니다. 영어 지문을 읽을 때나 시험 상황에서 심리적 압박이 크게 작용하고 있습니다. 불안을 낮추는 것이 영어 공부보다 먼저입니다. 쉬운 영어 콘텐츠로 영어에 대한 긍정적 경험을 먼저 쌓으세요."},
      H:{h:`영어 불안 조절 우수(${pct}점). 수능 영어 시험에서 긴 지문과 어려운 어휘를 만나도 집중력을 유지할 수 있는 심리 조건입니다. 실력이 점수로 안정적으로 연결됩니다.`,m:`영어 불안 중간(${pct}점). 고난이도 지문에서 불안이 급격히 상승하면 독해 속도가 저하됩니다. 어려운 지문을 시간 제한 안에 풀어보는 연습을 통해 불안 내성을 키우세요.`,l:`영어 불안 고점(${pct}점). 현재 영어 실력보다 낮은 점수가 나오고 있을 가능성이 높습니다. 수능 영어의 핵심은 속도와 정확성인데, 불안이 높으면 두 가지 모두 손상됩니다. 쉬운 지문 완독 루틴으로 영어 시험 자체에 대한 불안부터 낮추세요.`}
    },
    eng_interest:{
      E:{h:"영어 단어나 표현을 알게 될 때 즐겁고, 외국 문화에도 관심이 있군요! 이런 마음이 있으면 영어 공부가 의무가 아닌 즐거움이 될 수 있어요.",m:"가끔 영어가 흥미롭고 가끔은 지루할 때도 있죠. 영어로 된 좋아하는 영상이나 노래를 찾아보면 흥미가 자연스럽게 생길 수 있어요.",l:"지금 영어가 재미없고 그냥 외워야 하는 것처럼 느껴지나요? 좋아하는 영화나 노래로 시작하면 영어가 조금 다르게 느껴질 수 있어요."},
      M:{h:"영어 흥미가 높습니다. 영어 콘텐츠를 자발적으로 접하거나 표현의 뉘앙스에 관심을 갖는 수준이라면, 영어 실력이 시험 공부 이상으로 쌓이고 있을 것입니다.",m:"영어 흥미가 보통 수준입니다. 영어가 입시 도구라는 인식이 강할 수 있습니다. 관심 있는 분야(스포츠, 음악, 과학)의 영어 콘텐츠를 통해 흥미를 자연스럽게 키워보세요.",l:"영어 흥미가 낮습니다. 영어를 의무로만 접근하면 학습 지속성이 약해집니다. 지금 목표 대학·학과와 영어 능력의 연결을 명확히 하거나, 좋아하는 분야의 영어 콘텐츠로 흥미의 실마리를 찾아보세요."},
      H:{h:`영어 흥미 고점(${pct}점). 입시 영어를 넘어 영어 자체에 관심을 갖고 있습니다. 이 흥미가 어휘력과 독해력을 자연스럽게 높이는 동시에 수험 번아웃을 예방합니다.`,m:`영어 흥미 중간(${pct}점). 수능 영어는 흥미가 없어도 전략으로 접근 가능합니다. 단, 흥미 부재가 장기화되면 학습 효율이 떨어집니다. 관심 있는 영어 분야를 하나 찾아 공부와 연결해보세요.`,l:`영어 흥미 저점(${pct}점). 영어를 순전히 점수 도구로 보고 있습니다. 흥미 자체를 억지로 만들기보다, 목표 점수 달성이 가져다줄 결과에 집중하는 목적의식 전략이 현실적입니다.`}
    },
    eng_strategy:{
      E:{h:"영어 공부 방법이 좋아요! 단어를 예문과 함께 외우고, 모르는 단어를 문맥으로 유추하는 습관이 있어요. 이 방법으로 계속 공부하면 영어 실력이 빠르게 늘 거예요.",m:"기본적인 방법은 있지만, 틀린 문제를 왜 틀렸는지 꼼꼼히 확인하는 습관이 조금 더 필요해요. 모르는 단어가 나오면 그냥 넘어가지 말고 꼭 정리해두세요.",l:"영어 단어를 그냥 뜻만 반복해서 외우고 있지 않나요? 단어는 예문과 함께, 지문은 전체 흐름을 파악하면서 공부하는 방법으로 바꿔봐요. 시간이 걸려도 이 방법이 훨씬 오래 기억돼요."},
      M:{h:"영어 학습전략이 잘 갖춰져 있습니다. 어휘를 문맥과 함께 학습하고 오답 유형을 분류하는 전략이 있어, 같은 공부 시간에 성과가 더 높습니다.",m:"영어 학습전략이 보통 수준입니다. 기본적인 어휘 암기는 하지만 독해 전략이나 오답 분류가 체계적이지 않을 수 있습니다. 단어는 예문과 함께, 오답은 어휘·문법·독해 유형으로 구분하는 습관을 만드세요.",l:"영어 학습전략이 낮습니다. 단순 반복 암기에 의존하고 있다면 시간 대비 효율이 매우 낮습니다. 어휘는 맥락과 함께, 지문은 주제 파악 후 세부 내용 확인 순서로 공부 방법을 재설계하세요."},
      H:{h:`영어 학습전략 고점(${pct}점). 어휘 맥락화, 하향식 독해, 오답 유형 분류가 체계화된 상태입니다. 수능 영어 1등급을 위한 전략적 기반이 갖춰져 있습니다.`,m:`영어 학습전략 중간(${pct}점). 수능 영어는 단어 암기량보다 독해 전략이 점수를 결정합니다. 지문 유형별 접근법(빈칸추론·순서·요약)을 구체화하고 오답 패턴을 분류하는 루틴을 만드세요.`,l:`영어 학습전략 저점(${pct}점). 단어 반복 암기에 의존하는 공부는 수능 지문에서 한계가 명확합니다. 지금 당장 단어 학습법(예문·연상)과 독해 전략(주제 먼저 파악)을 전면 전환해야 합니다.`}
    },

    /* ══ 국어 ══ */
    kor_efficacy:{
      E:{h:"국어에 대한 자신감이 높아요! 어려운 글도 여러 번 읽으면 이해할 수 있다는 믿음이 있어요. 이 마음이 국어 실력을 계속 키워줄 거예요.",m:"국어가 어려울 때 자신감이 흔들릴 때가 있죠. 어려운 지문은 천천히 두 번 읽는 습관을 만들어봐요. 조금씩 이해되는 경험이 쌓이면 자신감도 커져요.",l:"국어가 너무 어렵고 '나는 국어를 못해'라는 생각이 강한 것 같아요. 국어 실력은 꾸준히 하면 반드시 늘어요. 짧고 쉬운 글부터 읽고 이해하는 경험을 먼저 쌓아봐요."},
      M:{h:"국어 자기효능감이 높습니다. 어려운 지문도 분석하면 이해할 수 있다는 믿음이 형성되어 있어, 국어 학습에서 포기하지 않는 힘이 됩니다.",m:"국어 자기효능감이 보통 수준입니다. 쉬운 지문은 자신 있지만 어려운 비문학이나 고전 문학에서 자신감이 낮아질 수 있습니다. 꾸준한 지문 분석 연습으로 성공 경험을 쌓으세요.",l:"국어 자기효능감이 낮습니다. 국어 성적 향상은 타고난 언어 감각보다 전략과 반복 연습에 달려 있습니다. 지금 수준에 맞는 지문부터 완전히 이해하는 경험을 쌓아가야 합니다."},
      H:{h:`국어 자기효능감 고점(${pct}점). 수능 국어 고난이도 지문에서도 전략적으로 접근할 수 있다는 확신이 있습니다. 이 믿음이 시험 중 당황하지 않고 끝까지 분석하는 힘이 됩니다.`,m:`국어 자기효능감 중간(${pct}점). 특정 지문 유형(철학·법·경제 등)에서 자신감이 떨어질 수 있습니다. 취약 유형을 집중 분석하여 '이 유형도 할 수 있다'는 경험을 쌓으세요.`,l:`국어 자기효능감 저점(${pct}점). 수능 국어에서 실패 경험이 누적되어 시험 전부터 포기하는 패턴이 있을 수 있습니다. 국어는 전략이 실력입니다. 올바른 지문 분석법부터 다시 훈련해야 합니다.`}
    },
    kor_attitude:{
      E:{h:"책 읽기와 글쓰기를 좋아하는군요! 이 습관이 국어 실력의 가장 든든한 기반이 돼요. 지금처럼 꾸준히 읽고 쓰는 것을 계속해봐요.",m:"독서나 글쓰기가 가끔은 귀찮게 느껴지기도 하죠. 좋아하는 주제의 짧은 글부터 시작해보세요. 관심 있는 내용이면 더 재미있게 읽을 수 있어요.",l:"읽기나 쓰기가 힘들게 느껴지는 것 같아요. 긴 책보다 짧은 이야기나 흥미로운 만화부터 시작해도 괜찮아요. 읽는 양을 조금씩 늘려가다 보면 점점 편안해질 거예요."},
      M:{h:"읽기·쓰기에 적극적인 태도를 갖고 있습니다. 다양한 글을 읽고 논리 구조를 파악하려는 태도가 국어 성적 향상의 핵심 기반입니다.",m:"읽기·쓰기 태도가 보통 수준입니다. 주어진 지문은 읽지만 자발적인 독서나 글쓰기는 부족할 수 있습니다. 관심 있는 분야의 책이나 칼럼을 주 1회라도 읽는 습관을 만드세요.",l:"읽기·쓰기 활동에 대한 거부감이 있습니다. 국어 성적 향상의 가장 확실한 방법은 독서 습관입니다. 지금 당장 하루 10분, 좋아하는 분야의 짧은 글부터 시작하세요."},
      H:{h:`읽기·쓰기 태도 우수(${pct}점). 복잡한 논증 구조를 분석하고 자신의 생각을 논리적으로 표현하는 능력이 수능 국어의 핵심입니다. 이 태도가 지속되면 국어 고득점의 기반이 됩니다.`,m:`읽기·쓰기 태도 중간(${pct}점). 수능 국어의 비문학 지문은 논리적 사고력을 요구합니다. 다양한 분야(인문·사회·과학)의 글을 분석적으로 읽는 연습을 늘리세요.`,l:`읽기·쓰기 태도 저점(${pct}점). 긴 지문에 대한 피로감이 수능 국어에서 직접적인 불이익으로 이어집니다. 지금부터 비문학 지문을 매일 1개씩 완독하고 주제를 정리하는 루틴을 만들어야 합니다.`}
    },
    kor_interest:{
      E:{h:"국어 수업에서 새로운 글이나 이야기를 배울 때 흥미롭게 느끼는군요! 이런 마음이 있으면 국어가 더 재미있어지고 실력도 빠르게 늘 거예요.",m:"어떤 내용은 재미있고 어떤 건 지루하기도 하죠. 시나 소설처럼 좋아하는 것부터 더 깊이 읽어보면 국어 전반에 대한 흥미도 조금씩 늘 수 있어요.",l:"국어가 외울 것만 많고 지루하게 느껴지나요? 좋아하는 영화나 드라마의 줄거리를 글로 써보거나, 관심 있는 이야기책부터 시작해보세요."},
      M:{h:"국어 흥미가 높습니다. 문학 작품의 의미를 탐구하거나 논리적 글에서 흥미를 찾고 있다면, 국어 공부 자체가 즐거운 활동이 될 수 있습니다.",m:"국어 흥미가 보통 수준입니다. 흥미로운 작품이나 주제에서는 몰입하지만 그렇지 않은 경우 지루함을 느낄 수 있습니다. 관심 있는 작품이나 분야를 국어 학습과 연결해보세요.",l:"국어 흥미가 낮습니다. 국어를 암기 과목으로만 인식하면 공부 동기가 유지되기 어렵습니다. 좋아하는 분야와 국어 지식을 연결하거나, 국어의 실용성(글쓰기, 논리적 표현)을 인식하는 것이 도움됩니다."},
      H:{h:`국어 흥미 고점(${pct}점). 수능 국어 지문에서 지적 자극을 받고 있다면, 단순 점수 공부를 넘어서 국어 본질적 역량이 형성되고 있습니다. 이 흥미가 어려운 지문에서도 끝까지 분석하는 힘이 됩니다.`,m:`국어 흥미 중간(${pct}점). 수능 국어는 흥미가 없어도 전략으로 접근 가능합니다. 단, 흥미 부재는 독해 집중력 저하로 이어질 수 있으므로 좋아하는 분야의 글을 시험 지문과 연결해보세요.`,l:`국어 흥미 저점(${pct}점). 수능 국어를 순전히 점수 도구로 인식하고 있습니다. 흥미보다 전략으로 접근하는 것이 현실적입니다. 지문 유형별 접근법을 익혀 '이 유형은 이렇게 풀면 된다'는 자신감을 먼저 형성하세요.`}
    },
    kor_strategy:{
      E:{h:"국어 공부 방법이 좋아요! 지문을 읽을 때 중심 내용을 파악하고, 모르는 낱말을 찾아보는 습관이 있어요. 이 방법으로 계속 하면 국어 실력이 탄탄해질 거예요.",m:"어느 정도 방법은 있지만, 틀린 문제를 왜 틀렸는지 분석하는 습관이 조금 더 필요해요. 국어 문제는 감이 아니라 지문 속 근거로 푸는 연습을 해봐요.",l:"국어 문제를 감으로 풀거나, 지문을 꼼꼼히 읽지 않고 답을 찾는 습관이 있지 않나요? 국어는 반드시 지문 속에 답이 있어요. 지문을 천천히 정확하게 읽는 연습부터 시작해봐요."},
      M:{h:"국어 학습전략이 잘 갖춰져 있습니다. 지문 분석과 오답 원인 파악이 체계화되어 있어, 국어 성적이 안정적으로 유지될 수 있는 기반이 있습니다.",m:"국어 학습전략이 보통 수준입니다. 기본적인 읽기는 되지만 비문학의 논리 구조 파악이나 문학의 주제 분석이 부족할 수 있습니다. 오답 이유를 '어휘 몰라서·지문 잘못 읽어서·논리 오류'로 구분하는 습관을 만드세요.",l:"국어 학습전략이 낮습니다. 감각적 판단에 의존하거나 지문을 정확히 읽지 않는 경향이 있습니다. 국어는 지문이 근거입니다. 모든 답을 지문에서 찾는 습관부터 재훈련해야 합니다."},
      H:{h:`국어 학습전략 고점(${pct}점). 비문학의 논리 구조 파악과 문학의 작품 분석이 전략적으로 이루어지고 있습니다. 수능 국어 고득점에 직결되는 역량입니다.`,m:`국어 학습전략 중간(${pct}점). 수능 국어는 감각이 아닌 전략입니다. 지문 유형별 접근법(글의 구조 파악 → 핵심 파악 → 선지 대조)을 체계화하고 오답 유형을 분류하는 루틴을 만드세요.`,l:`국어 학습전략 저점(${pct}점). 직관이나 느낌에 의존한 풀이는 수능에서 반드시 한계를 드러냅니다. 지금 당장 '지문 기반 풀이' 원칙을 세우고 모든 선지를 지문에서 근거를 찾아 검증하는 훈련을 시작하세요.`}
    },

    /* ══ 과학 ══ */
    sci_efficacy:{
      E:{h:"과학에 대한 자신감이 높아요! 어려운 과학 개념도 공부하면 이해할 수 있다는 믿음이 있어서, 실험도 탐구도 즐겁게 할 수 있어요.",m:"쉬운 과학은 자신 있지만 어려운 개념이나 계산이 나오면 자신감이 떨어질 때가 있어요. 어려운 개념은 그림으로 그려보거나 선생님에게 꼭 물어봐요.",l:"과학이 어렵고 '나는 과학을 못해'라는 생각이 강한 것 같아요. 과학은 외우는 게 아니라 이해하는 거예요. 아주 기본적인 개념 하나부터 '왜?'라고 질문하는 것부터 시작해봐요."},
      M:{h:"과학 자기효능감이 높습니다. 어려운 과학 문제도 풀어낼 수 있다는 믿음이 있어 도전을 포기하지 않는 힘이 형성되어 있습니다.",m:"과학 자기효능감이 보통 수준입니다. 기본 개념은 이해하지만 응용 문제에서 자신감이 낮아질 수 있습니다. 개념 이해 후 다양한 유형의 문제를 풀어보며 성공 경험을 쌓으세요.",l:"과학 자기효능감이 낮습니다. 과학에서 실패 경험이 쌓여 도전 자체를 피하고 있을 수 있습니다. 이과 적성과 무관하게 과학 성적은 전략과 훈련으로 향상됩니다. 가장 쉬운 단원부터 완전히 이해하는 경험을 쌓으세요."},
      H:{h:`과학 자기효능감 고점(${pct}점). 고난이도 과학 문제에서도 원리를 적용하여 해결할 수 있다는 확신이 있습니다. 이 믿음이 수능 과학 변형 문제에서 결정적으로 작동합니다.`,m:`과학 자기효능감 중간(${pct}점). 익숙한 유형은 자신 있지만 낯선 적용 문제에서 흔들릴 수 있습니다. 다양한 변형 문제를 풀어보며 '원리로 접근하면 된다'는 경험을 누적하세요.`,l:`과학 자기효능감 저점(${pct}점). 과학 공부에서 실패 패턴이 반복되어 시험 전부터 포기하는 경향이 있을 수 있습니다. 지금 수준에서 완전히 이해 가능한 단원부터 시작해 성공 회로를 먼저 만들어야 합니다.`}
    },
    sci_inquiry:{
      E:{h:"과학 시간에 '왜 그럴까?'라는 궁금증을 자주 느끼는군요! 이 호기심이 과학자의 마음이에요. 궁금한 것을 찾아보는 습관이 과학 실력을 쑥쑥 키워줄 거예요.",m:"가끔 과학이 신기하고 흥미롭지만, 항상 그런 건 아니죠. 실험할 때나 신기한 현상이 나올 때 '왜 그럴까?'라고 한 번 더 생각해보는 습관을 길러봐요.",l:"과학 탐구 활동이 귀찮거나 그냥 결과만 확인하고 싶을 때가 많은가요? 과학은 '왜?'라는 질문에서 시작해요. 오늘 수업에서 하나만 '왜 이렇게 되지?'라고 질문해보세요."},
      M:{h:"탐구 태도가 적극적입니다. 과학적 현상에 '왜?'라는 질문을 던지고 스스로 답을 찾으려는 태도가 개념 이해 수준을 높이고, 수능 변형 문제에서도 강점이 됩니다.",m:"탐구 태도가 보통 수준입니다. 주어진 내용을 수용하는 수준이지만 스스로 탐구하는 데는 소극적일 수 있습니다. 실험 결과를 단순 기록하는 것에서 벗어나 '왜 이 결과가 나왔지?'를 한 번 더 생각해보세요.",l:"탐구 태도가 낮습니다. 과학을 암기 과목으로 접근하는 경향이 강합니다. 원리를 이해하지 않고 공식만 외우면 수능 변형 문제에서 반드시 막힙니다. 지금부터 공식 하나를 외울 때 '왜 이 공식이 성립하나?'를 함께 이해하세요."},
      H:{h:`탐구 태도 우수(${pct}점). 원리 중심의 탐구적 학습 태도가 형성되어 있습니다. 수능 과학의 고난이도 문제는 암기가 아닌 원리 적용을 요구하므로, 이 태도가 실질적인 경쟁 우위가 됩니다.`,m:`탐구 태도 중간(${pct}점). 기본 원리는 이해하지만 낯선 상황에 적용하는 데 어려움이 있을 수 있습니다. 교과서 예제를 변형해서 스스로 문제를 만들어보는 연습이 탐구력을 높입니다.`,l:`탐구 태도 저점(${pct}점). 공식 암기 중심의 학습은 수능 과학에서 한계가 명확합니다. 지금 당장 암기보다 이해 중심으로 전환해야 합니다. 교과서 개념을 자기 말로 설명할 수 있을 때까지 공부하는 루틴을 만드세요.`}
    },
    sci_interest:{
      E:{h:"과학이 재미있고 자연 현상이나 우주에 대해 궁금한 게 많군요! 이런 호기심이 과학자의 가장 중요한 자질이에요. 지금 이 흥미를 계속 키워나가봐요.",m:"과학이 가끔은 흥미롭고 가끔은 어렵게 느껴지죠. 좋아하는 과학 주제(우주, 동물, 실험)를 찾아서 더 깊이 알아보면 과학이 더 재미있어질 수 있어요.",l:"과학이 지루하거나 너무 어렵게 느껴지나요? 좋아하는 자연 현상이나 동물을 관찰하는 것부터 시작해봐요. 과학 다큐멘터리를 보는 것도 좋아요."},
      M:{h:"과학 흥미가 높습니다. 과학적 현상에 지적 흥미를 느끼고 있어, 공부 자체가 즐거운 경험이 될 수 있습니다. 이 흥미가 어려운 단원에서도 포기하지 않는 동력이 됩니다.",m:"과학 흥미가 보통 수준입니다. 재미있는 실험이나 현상에서는 몰입하지만 개념 암기가 많은 단원에서는 흥미가 낮아질 수 있습니다. 과학 지식이 실생활에 어떻게 적용되는지 찾아보면 흥미가 유지됩니다.",l:"과학 흥미가 낮습니다. 과학을 의무로만 느끼고 있다면 학습 효율이 낮을 수밖에 없습니다. 과학의 실용적 측면(의학, 기술, 환경)이나 관심 있는 분야와 과학의 연결을 찾아보세요."},
      H:{h:`과학 흥미 고점(${pct}점). 선택 과학 과목에서 지적 흥미를 느끼고 있습니다. 이 흥미가 어려운 개념을 끝까지 탐구하게 만드는 원동력이 됩니다.`,m:`과학 흥미 중간(${pct}점). 수능 과학은 흥미가 없어도 전략으로 접근 가능합니다. 단, 흥미 부재가 지속되면 긴 학습 시간을 버티는 것이 어려워집니다. 관심 있는 분야와 과학 내용을 연결해보세요.`,l:`과학 흥미 저점(${pct}점). 과학을 순수히 수능 점수 도구로만 보고 있습니다. 지금 흥미를 만들려는 노력보다, 목표 등급 달성이 가져다줄 결과에 집중하는 목적의식 전략이 더 현실적입니다.`}
    },
    sci_strategy:{
      E:{h:"과학 공부 방법이 좋아요! 개념을 그림으로 정리하고, 과학 개념들이 어떻게 연결되는지 파악하려 해요. 이 방법으로 공부하면 오래 기억될 거예요.",m:"어느 정도 방법은 있지만, 과학 개념을 실제 현상과 연결하는 연습이 더 필요해요. 배운 내용이 실생활에서 어떻게 쓰이는지 찾아보면 이해가 훨씬 깊어져요.",l:"과학 내용을 그냥 외우기만 하지 않나요? 과학은 암기가 아니라 이해예요. 개념 하나를 완전히 이해한 다음 그 개념이 어디에 쓰이는지 연결해보는 방법으로 바꿔봐요."},
      M:{h:"과학 학습전략이 잘 갖춰져 있습니다. 원리 이해 중심 학습과 오답 분류 분석이 체계화되어 있어, 다양한 문제 유형에 효과적으로 대응할 수 있습니다.",m:"과학 학습전략이 보통 수준입니다. 기본 개념은 이해하지만 오답 원인 분석이 부족합니다. 공식 암기와 개념 이해를 구분하고, 틀린 문제를 개념 오류·적용 실수로 분류하는 습관을 만드세요.",l:"과학 학습전략이 낮습니다. 공식과 내용을 이해 없이 암기하는 경향이 강합니다. 수능 과학은 이해와 적용이 핵심입니다. 지금 당장 공부 방법을 '왜?'를 중심으로 재설계해야 합니다."},
      H:{h:`과학 학습전략 고점(${pct}점). 개념 원리 이해와 오답 3분류 분석이 체계화된 상태입니다. 수능 과학 고득점을 위한 전략적 기반이 갖춰져 있습니다.`,m:`과학 학습전략 중간(${pct}점). 수능 과학은 공식 암기보다 개념의 적용력이 점수를 결정합니다. 오답 분석 시 '어떤 원리를 잘못 이해했나'를 먼저 파악하는 루틴을 만드세요.`,l:`과학 학습전략 저점(${pct}점). 암기 중심의 과학 공부는 변형 문제에서 반드시 한계가 드러납니다. 지금 당장 이해 기반 학습으로 전환하고, 개념을 자기 말로 설명할 수 있는 수준까지 공부하는 방식으로 바꿔야 합니다.`}
    },

    /* ══ 사회 ══ */
    soc_efficacy:{
      E:{h:"사회에 대한 자신감이 높아요! 어려운 사회 내용도 공부하면 이해할 수 있다는 믿음이 있어요. 이 자신감이 사회 성적을 올려주는 힘이 돼요.",m:"사회가 어려울 때 자신감이 흔들릴 때가 있죠. 암기해야 할 것이 많은 것처럼 느껴지지만, 이해하면서 외우면 훨씬 쉬워져요. 핵심 개념부터 차근차근 해봐요.",l:"사회가 너무 어렵고 외울 게 너무 많아서 포기하고 싶은 마음이 드나요? 한 번에 다 외우려고 하지 말고, 오늘 딱 한 단원의 핵심 3가지만 이해하는 것부터 시작해봐요."},
      M:{h:"사회 자기효능감이 높습니다. 복잡한 사회 개념도 이해하고 분석할 수 있다는 믿음이 형성되어 있어, 방대한 내용도 포기하지 않고 끝까지 학습하는 힘이 됩니다.",m:"사회 자기효능감이 보통 수준입니다. 기본 내용은 이해하지만 방대한 암기량 앞에서 자신감이 낮아질 수 있습니다. 단원별 핵심 개념을 구조화하여 정리하면 자신감이 올라갑니다.",l:"사회 자기효능감이 낮습니다. 암기량에 압도되어 시작 자체를 어렵게 느끼고 있을 수 있습니다. 사회 성적은 전략적 접근으로 향상 가능합니다. 가장 쉬운 단원 하나를 완전히 마스터하는 경험부터 시작하세요."},
      H:{h:`사회 자기효능감 고점(${pct}점). 선택 사회 과목에서 목표 등급을 달성할 수 있다는 확신이 있습니다. 이 믿음이 방대한 내용을 체계적으로 정복하는 원동력이 됩니다.`,m:`사회 자기효능감 중간(${pct}점). 내용의 방대함이 자신감을 낮추고 있을 수 있습니다. 단원별 성취 경험을 누적하고, 이미 잘 정리된 단원에서 자신감을 확인하며 다음 단원으로 이동하세요.`,l:`사회 자기효능감 저점(${pct}점). 지금 사회 과목의 암기량에 압도되어 있는 상태입니다. 전체를 보지 말고, 오늘 한 단원만 완전히 이해하는 작은 성공부터 시작하세요.`}
    },
    soc_burden:{
      E:{h:"사회 암기 부담을 잘 조절하고 있어요! 외울 것이 많은 사회를 잘 다스리고 있다는 건 공부 방법이 좋다는 뜻이에요. 이 방법으로 계속 해봐요.",m:"사회 암기량이 때로는 부담스럽게 느껴지기도 하죠. 무조건 외우기보다는 이해하고 연결하면 더 쉽게 외워져요. 마인드맵이나 그림으로 정리해보는 건 어떨까요?",l:"사회 암기량이 너무 많아서 힘들고 지치는 마음이 크군요. 억지로 다 외우려 하면 더 힘들어요. 핵심 개념만 이해하고, 나머지는 그 개념에서 연결해가는 방식으로 바꿔봐요."},
      M:{h:"사회 암기 부담을 잘 관리하고 있습니다. 이해 중심으로 접근하여 암기 부담을 줄이고 있어, 다른 과목 학습에도 여유가 있습니다. 이 전략을 계속 유지하세요.",m:"사회 암기 부담이 보통 수준입니다. 내용이 많은 단원에서 부담이 커질 수 있습니다. 단순 반복 암기보다 개념 구조화(표, 마인드맵)를 통해 암기 효율을 높이세요.",l:"사회 암기 부담이 높습니다. 방대한 암기량이 사회 공부 자체에 대한 회피로 이어지고 있을 수 있습니다. 암기를 이해로 대체하는 전략(인과관계 파악, 개념 분류)이 필요합니다."},
      H:{h:`사회 암기 부담 조절 우수(${pct}점). 방대한 사회 내용을 구조화하여 효율적으로 관리하고 있습니다. 다른 과목에 충분한 시간을 배분할 수 있는 여유가 있는 상태입니다.`,m:`사회 암기 부담 중간(${pct}점). 시험 직전 암기 부담이 급증할 수 있습니다. 지금부터 단원별 핵심 개념을 구조화하고, 시험 전 최종 정리 루틴을 미리 설계하세요.`,l:`사회 암기 부담 고점(${pct}점). 암기량이 수험 전반의 심리적 자원을 소진하고 있습니다. 암기 중심에서 이해-구조화 학습으로 전환하지 않으면 다른 과목에도 영향을 미칩니다. 지금 당장 학습 방식을 바꾸세요.`}
    },
    soc_interest:{
      E:{h:"사회 수업에서 역사 이야기나 사회 현상이 흥미롭게 느껴지는군요! 뉴스에도 관심이 있다니 정말 멋져요. 이런 관심이 사회 공부의 가장 좋은 출발점이에요.",m:"어떤 사회 내용은 흥미롭고 어떤 건 지루할 수 있어요. 오늘 뉴스에서 사회 수업과 관련된 내용을 찾아보면 사회가 더 재미있게 느껴질 거예요.",l:"사회가 외울 것만 많고 재미없게 느껴지나요? 역사 드라마나 사회 다큐멘터리를 보면 사회 공부와 자연스럽게 연결될 수 있어요."},
      M:{h:"사회 흥미가 높습니다. 사회 현상이나 역사적 사건의 인과관계에 관심을 갖고 있어, 단순 암기를 넘어 이해 중심으로 학습할 수 있는 기반이 됩니다.",m:"사회 흥미가 보통 수준입니다. 흥미로운 단원에서는 몰입하지만 암기 위주의 단원에서는 흥미가 낮아질 수 있습니다. 시사 이슈와 교과 내용을 연결하면 흥미가 유지되는 데 도움됩니다.",l:"사회 흥미가 낮습니다. 사회를 암기 과목으로만 인식하고 있습니다. 사회 지식이 실생활(뉴스, 정치, 경제)에 어떻게 연결되는지를 발견하면 조금씩 흥미가 생길 수 있습니다."},
      H:{h:`사회 흥미 고점(${pct}점). 선택 사회 과목에서 지적 흥미를 느끼고 있어, 방대한 내용을 탐구하는 동기가 있습니다. 이 흥미가 수험 후반부의 번아웃을 막아주는 핵심입니다.`,m:`사회 흥미 중간(${pct}점). 수능 사회탐구는 흥미 없이도 전략으로 접근 가능합니다. 단, 흥미 부재가 지속되면 방대한 내용을 버티는 것이 힘들어집니다. 관심 있는 시사 이슈와 교과 내용을 연결해보세요.`,l:`사회 흥미 저점(${pct}점). 사회를 순수 점수 도구로 보고 있습니다. 흥미보다 전략으로 접근하는 것이 현실적입니다. 선택 과목의 출제 패턴을 파악하고 고득점 전략을 세우는 데 집중하세요.`}
    },
    soc_strategy:{
      E:{h:"사회 공부 방법이 좋아요! 내용을 그림이나 표로 정리하고, 개념들의 관계를 파악하면서 공부하는 습관이 있어요. 이 방법이 사회를 오래 기억하게 해줘요.",m:"어느 정도 방법은 있지만, 사회 개념들 사이의 관계를 더 잘 연결하는 연습이 필요해요. 비슷한 개념들을 묶어서 비교하면 훨씬 잘 외워져요.",l:"사회 내용을 무작정 반복해서 외우려고 하지 않나요? 개념의 뜻을 이해하고, 왜 그런지를 먼저 파악하면 외우는 양이 훨씬 줄어들어요. 핵심 개념의 '의미'부터 이해해봐요."},
      M:{h:"사회 학습전략이 잘 갖춰져 있습니다. 개념 구조화와 이해 기반 암기 전략이 있어, 방대한 사회 내용을 효율적으로 정복하고 있습니다.",m:"사회 학습전략이 보통 수준입니다. 기본적인 정리는 하지만 개념 간의 인과관계나 비교 분류 전략이 부족합니다. 단원별 핵심 개념을 구조화하고 오답을 개념 오류와 암기 실수로 구분하는 습관을 만드세요.",l:"사회 학습전략이 낮습니다. 단순 반복 암기에 의존하는 경향이 강합니다. 수능 사회탐구는 단순 암기를 넘어 개념 적용과 자료 해석을 요구합니다. 지금 당장 이해 중심 구조화 학습으로 전환해야 합니다."},
      H:{h:`사회 학습전략 고점(${pct}점). 개념 도식화와 오답 유형 분류가 체계화된 상태입니다. 수능 사회탐구 고득점을 위한 전략적 기반이 갖춰져 있습니다.`,m:`사회 학습전략 중간(${pct}점). 수능 사회탐구는 암기량보다 개념 이해와 자료 해석 능력이 점수를 결정합니다. 오답 분석 시 '어떤 개념을 잘못 이해했나'를 우선 파악하는 루틴을 만드세요.`,l:`사회 학습전략 저점(${pct}점). 단순 반복 암기에 의존한 학습은 수능 고난이도 문제에서 한계가 명확합니다. 지금 당장 개념 구조화(인과·비교·분류) 방식으로 전환하고, 기출문제 유형별 분석을 도입하세요.`}
    }
  };

  if(!C[key]){
    if(h) return `${pct}점으로 높은 수준입니다. 현재의 강점을 유지하면서 더 발전시켜 나가세요.`;
    if(l) return `${pct}점으로 집중 개선이 필요한 수준입니다. 지금 바로 방법과 태도를 점검하세요.`;
    return `${pct}점으로 보통 수준입니다. 취약한 부분을 찾아 집중적으로 보완하면 성적 향상이 가능합니다.`;
  }
  return C[key][level][tier];
}

/* ═══════════════════════════════════════
   교과 검사 페이지 (학생용)
═══════════════════════════════════════ */
function SubjectTestPage({studentData,subject,onComplete,savedAnswers={},totalSubjects=[],doneSubjects=[]}){
  const SECTIONS=buildSubjectSections(subject,studentData.level||"M");
  const subjectLabel=SUBJECT_INFO[subject].label;
  const subjectIdx=totalSubjects.indexOf(subject)+1;
  const subjectTotal=totalSubjects.length;

  // savedAnswers가 이 교과의 문항 ID를 포함하는지 확인
  // 다른 교과 답변이 섞이면 무시
  const myQuestionIds=new Set(SECTIONS.flatMap(s=>s.questions.map(q=>q.id)));
  const validSavedAnswers=Object.fromEntries(
    Object.entries(savedAnswers).filter(([k])=>myQuestionIds.has(k))
  );

  function calcResumePos(){
    for(let s=0;s<SECTIONS.length;s++){
      for(let q=0;q<SECTIONS[s].questions.length;q++){
        if(validSavedAnswers[SECTIONS[s].questions[q].id]===undefined) return{si:s,qi:q};
      }
    }
    return{si:0,qi:0};
  }
  const resume=calcResumePos();
  const [si,setSi]=useState(resume.si);
  const [qi,setQi]=useState(resume.qi);
  const [ans,setAns]=useState(validSavedAnswers);
  const [sel,setSel]=useState(null);

  const sec=SECTIONS[si];
  const q=sec.questions[qi];
  const total=SECTIONS.reduce((a,s)=>a+s.questions.length,0);
  const done=SECTIONS.slice(0,si).reduce((a,s)=>a+s.questions.length,0)+qi;
  const pct=Math.round((done/total)*100);
  const isLast=(done+1===total);
  const timerRef=useRef(null);
  const advancingRef=useRef(false);

  useEffect(()=>{
    setSel(ans[q.id]??null);
    advancingRef.current=false;
    window.scrollTo({top:0,behavior:"smooth"});
    return()=>{if(timerRef.current)clearTimeout(timerRef.current);};
  },[si,qi]);

  function advance(val){
    if(advancingRef.current) return;
    if(val===null||val===undefined) return;
    advancingRef.current=true;
    const na={...ans,[q.id]:val};
    setAns(na);
    dbSet(`tlp_subj_answers_${studentData.id}_${subject}`,na).catch(()=>{});
    if(qi<sec.questions.length-1){setQi(x=>x+1);}
    else if(si<SECTIONS.length-1){setSi(x=>x+1);setQi(0);}
    else{
      // 완료 전 미응답 검증
      const allQuestions=SECTIONS.flatMap(s=>s.questions);
      const unanswered=allQuestions.filter(q=>na[q.id]===undefined);
      if(unanswered.length>0){
        let found=false;
        for(let s=0;s<SECTIONS.length;s++){
          for(let qq=0;qq<SECTIONS[s].questions.length;qq++){
            if(na[SECTIONS[s].questions[qq].id]===undefined){
              advancingRef.current=false;
              setSi(s);setQi(qq);
              found=true;break;
            }
          }
          if(found)break;
        }
        return;
      }
      onComplete(na);
    }
  }
  function handleSelect(v){
    if(advancingRef.current) return;
    setSel(v);
    if(!isLast){
      if(timerRef.current) clearTimeout(timerRef.current);
      timerRef.current=setTimeout(()=>advance(v),300);
    }
  }
  function back(){
    advancingRef.current=false;
    if(timerRef.current){clearTimeout(timerRef.current);timerRef.current=null;}
    if(qi>0)setQi(x=>x-1);
    else if(si>0){setSi(x=>x-1);setQi(SECTIONS[si-1].questions.length-1);}
  }

  function handleComplete(){
    advancingRef.current=false;
    if(sel!==null) advance(sel);
  }

  return(
    <div className="page"><Header/>
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <span style={{fontSize:12,fontWeight:700,padding:"4px 12px",borderRadius:3,background:SUBJECT_INFO[subject].color,color:"#F0D8A8",letterSpacing:1}}>{subjectLabel} 학습심리 진단</span>
          {subjectTotal>0&&<span style={{fontSize:11,color:"var(--gray-500)",opacity:0.7}}>교과 {subjectIdx}/{subjectTotal}</span>}
        </div>
        <div className="progress-wrap" style={{marginBottom:0}}>
          <div className="progress-meta">
            <span className="progress-section">{sec.kr}</span>
            <span className="progress-count">{done+1} / {total}</span>
          </div>
          <div className="progress-bg"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
        </div>
      </div>

      <div className="hint-box">"{sec.hint}"</div>

      <div className="q-card">
        <div className="q-num">Q {done+1}</div>
        <div className="q-text">{q.text}</div>
        <div className="likert-wrap">
          {LIKERT.map((label,i)=>(
            <div key={i} className={`likert-opt ${sel===i+1?"sel":""}`} onClick={()=>handleSelect(i+1)}>
              <div className="likert-radio">{sel===i+1&&<div className="likert-dot"/>}</div>
              <span className="likert-label">{label}</span>
            </div>))}
        </div>
      </div>

      <div className="nav-row">
        {(si>0||qi>0)&&<button className="btn-back" onClick={back}>← 이전</button>}
        {isLast&&(
          <button className="btn-next" onClick={handleComplete} disabled={sel===null}>
            검사 완료 →
          </button>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   교과 결과지
═══════════════════════════════════════ */
function SubjectResultPage({studentData,subject,answers,isDirectLink=false}){
  const [toast,setToast]=useState("");
  const level=studentData.level||"M";
  const SECTIONS=buildSubjectSections(subject,level);
  const scores=SECTIONS.map(s=>({...s,pct:calcSubjectScore(answers,s)}));
  const overall=getSubjectOverallComment(subject,scores,level,studentData.name);
  const subjectLabel=SUBJECT_INFO[subject].label;
  const subjectColor=SUBJECT_INFO[subject].color;
  const levelLabel=level==="E"?"초등학교":level==="M"?"중학교":"고등학교";

  function copyLink(){
    navigator.clipboard.writeText(`${location.origin}${location.pathname}?sr=${studentData.id}&subj=${subject}`)
      .then(()=>setToast("결과지 링크가 복사되었습니다!"));
  }

  return(
    <div className="page"><Header/>
      <div className="no-print" style={{display:"flex",justifyContent:isDirectLink?"flex-end":"space-between",alignItems:"center",gap:8,marginBottom:16}}>
        {!isDirectLink&&<button onClick={()=>window.location.href=location.pathname} style={{padding:"7px 14px",borderRadius:4,fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid var(--border-s)",background:"var(--purple-pale)",color:"var(--purple)",fontFamily:"'Noto Sans KR',sans-serif"}}>
          ← 관리자 홈
        </button>}
        <button onClick={()=>handlePrint()} style={{padding:"7px 14px",borderRadius:4,fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid var(--border-s)",background:"var(--gray-100)",color:"var(--gray-900)",fontFamily:"'Noto Sans KR',sans-serif"}}>PDF 저장</button>
      </div>

      {/* 커버 */}
      <div className="result-cover" style={{background:`repeating-linear-gradient(91deg,transparent 0,rgba(255,255,255,0.06) 1px,transparent 2px,transparent 20px),linear-gradient(135deg,${subjectColor}cc,${subjectColor})`}}>
        <div className="result-cover-name">{studentData.name} 학생의 {subjectLabel} 학습심리 진단 결과</div>
        <div className="result-cover-sub">필탑 교과별 학습심리 진단검사 · {levelLabel}용</div>
        <div className="result-info-row">
          {studentData.schoolName&&<span className="result-info-chip">{studentData.schoolName}</span>}
          <span className="result-info-chip">{studentData.school} {studentData.grade}</span>
        </div>
        <div className="result-total-score">
          <span style={{fontSize:14,color:"rgba(240,216,168,0.6)"}}>종합 점수</span>
          <span className="score-num">{overall.avg}</span>
          <span className="score-unit">점</span>
          <span className="score-grade">{overall.grade}</span>
        </div>
        <div className="result-date">{new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric"})} 검사 완료</div>
      </div>

      {/* 종합 해석 */}
      <div className="card" style={{marginBottom:18,borderLeft:`4px solid ${subjectColor}`}}>
        <div style={{fontSize:11,fontWeight:700,color:"var(--gray-500)",letterSpacing:1.5,marginBottom:8}}>{subjectLabel} 학습심리 종합</div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <span style={{fontFamily:"'Noto Serif KR',serif",fontSize:26,fontWeight:700,color:overall.avg>=75?"var(--green)":overall.avg>=55?"var(--purple)":"var(--red)"}}>{overall.avg}점</span>
          <span style={{fontSize:13,fontWeight:700,padding:"3px 10px",borderRadius:3,background:overall.avg>=75?"rgba(42,90,42,0.12)":overall.avg>=55?"rgba(74,44,16,0.1)":"rgba(122,40,16,0.1)",color:overall.avg>=75?"var(--green)":overall.avg>=55?"var(--purple)":"var(--red)",border:`1px solid ${overall.avg>=75?"rgba(42,90,42,0.2)":overall.avg>=55?"rgba(74,44,16,0.2)":"rgba(122,40,16,0.2)"}`}}>{overall.grade}</span>
        </div>
        <div style={{fontSize:14,color:"var(--text-mid)",lineHeight:1.9,marginBottom:12}}>{overall.intro}</div>
        <div style={{display:"flex",gap:20,fontSize:13,paddingTop:12,borderTop:"1px solid var(--border)"}}>
          <div><span style={{color:"var(--gray-500)",opacity:0.7}}>가장 강한 요인 </span><strong style={{color:"var(--green)"}}>{overall.top.kr} {overall.top.pct}점</strong></div>
          <div><span style={{color:"var(--gray-500)",opacity:0.7}}>가장 약한 요인 </span><strong style={{color:"var(--red)"}}>{overall.bottom.kr} {overall.bottom.pct}점</strong></div>
        </div>
      </div>

      {/* 요인별 카드 */}
      {scores.map(s=>{
        const lv=getLevel(s.pct);
        const comment=getSubjectFactorComment(s.key,s.pct,level);
        const sc=s.pct>=70?"var(--green)":s.pct>=40?"var(--purple)":"var(--red)";
        return(
          <div key={s.key} className="factor-card" style={{marginBottom:12}}>
            <div className="factor-card-header">
              <div>
                <div style={{fontSize:11,fontWeight:700,color:subjectColor,letterSpacing:1,marginBottom:3}}>{subjectLabel}</div>
                <div className="factor-card-name">{s.kr}<span className="factor-card-en">{s.en}</span></div>
              </div>
              <div className="factor-card-score-wrap">
                <span className="factor-card-score" style={{color:sc}}>{s.pct}점</span>
                <span className={`lv-badge ${lv.cls}`}>{lv.label}</span>
              </div>
            </div>
            <div className="factor-hint">"{s.hint}"</div>
            {/* 바 */}
            <div style={{marginBottom:10}}>
              <div className="fbar-wrap" style={{height:6}}>
                <div className="fbar-fill" style={{width:`${s.pct}%`,background:getBarColor(s.pct)}}/>
              </div>
            </div>
            <div className="factor-comment">{comment}</div>
          </div>);
      })}

      {/* 하단 전화 문의 */}
      <div className="no-print" style={{marginTop:8,padding:"16px 20px",background:"var(--purple-pale)",borderRadius:10,border:"1px solid var(--border-s)"}}>
        <div style={{fontSize:12,fontWeight:700,color:"var(--purple)",marginBottom:10,letterSpacing:0.5}}>결과 상담 문의</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <a href="tel:031-274-1334" style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"12px 8px",background:"#fff",border:"1px solid var(--border-s)",borderRadius:8,textDecoration:"none",color:"var(--purple)"}}>
            <span style={{fontSize:11,fontWeight:700,marginBottom:3}}>초·중등관</span>
            <span style={{fontSize:14,fontWeight:700}}>031-274-1334</span>
            <span style={{fontSize:11,marginTop:3,color:"var(--gray-500)"}}>📞 전화 연결</span>
          </a>
          <a href="tel:031-275-1435" style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"12px 8px",background:"#fff",border:"1px solid var(--border-s)",borderRadius:8,textDecoration:"none",color:"var(--purple)"}}>
            <span style={{fontSize:11,fontWeight:700,marginBottom:3}}>고등관</span>
            <span style={{fontSize:14,fontWeight:700}}>031-275-1435</span>
            <span style={{fontSize:11,marginTop:3,color:"var(--gray-500)"}}>📞 전화 연결</span>
          </a>
        </div>
      </div>

      {toast&&<Toast msg={toast} onClose={()=>setToast("")}/>}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
